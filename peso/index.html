<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Peso — Controlo diário</title>
<link rel="icon" type="image/png" href="pesoicon192.png">
<link rel="apple-touch-icon" href="pesoicon192.png">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIkNvbnRyb2xvIGRlIFBlc28iLCAic2hvcnRfbmFtZSI6ICJQZXNvIiwgInN0YXJ0X3VybCI6ICIuLyIsICJzY29wZSI6ICIuLyIsICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLCAiYmFja2dyb3VuZF9jb2xvciI6ICIjRkFGQkY4IiwgInRoZW1lX2NvbG9yIjogIiNGQUZCRjgiLCAiaWNvbnMiOiBbeyJzcmMiOiAicGVzb2ljb24xOTIucG5nIiwgInNpemVzIjogIjE5MngxOTIiLCAidHlwZSI6ICJpbWFnZS9wbmcifSwgeyJzcmMiOiAicGVzb2ljb241MTIucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmcifV19">
<meta name="theme-color" content="#FAFBF8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Peso">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFBF8;
    --panel:#FFFFFF;
    --panel2:#EEF4F0;
    --line:#DCE7E0;
    --text:#556066;
    --text-dim:#8B979C;
    --lime:#4F8D74;
    --lime-ink:#FFFFFF;
    --lime-glow:rgba(79,141,116,.22);
    --teal:#6FAF8F;
    --mint:#A8D5BA;
    --amber:#D69E4D;
    --amber-tint:rgba(214,158,77,.15);
    --danger:#D97A66;
    --danger-tint:rgba(217,122,102,.14);
    --ok:#4F8D74;
    --ok-tint:rgba(79,141,116,.14);
    --font-mono:'DM Mono', monospace;
    --font-sans:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0 auto;
    max-width:480px;
    height:100vh;
    height:100svh;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    overflow-x:hidden;
    overscroll-behavior-y:auto;
    overscroll-behavior-x:none;
    font-family:var(--font-sans);
    background:var(--bg);
    color:var(--text);
    position:relative;
  }

  #bgWatermark{
    position:fixed;
    bottom:-12%;
    right:-22%;
    width:125%;
    max-width:600px;
    aspect-ratio:1/1;
    background-image:url('pesoicon512.png');
    background-size:contain;
    background-repeat:no-repeat;
    background-position:bottom right;
    opacity:0.20;
    filter:saturate(1.3);
    pointer-events:none;
    z-index:0;
  }

  header, #authArea, #app, footer{ position:relative; z-index:1; }

  header{
    flex:0 0 auto;
    padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
  }
  header .brand{font-size:1.05rem;font-weight:800;letter-spacing:-0.01em;display:flex;align-items:center;gap:6px;}
  header .brand .ico{color:var(--lime);}
  header .sub{font-size:0.68rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;}

  #authArea{flex:0 0 auto;padding:56px 24px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;}
  #authArea p{color:var(--text-dim);font-size:0.9rem;margin:0;}

  button{font-family:inherit;border:none;border-radius:10px;cursor:pointer;font-weight:700;}
  .btn-lime{background:var(--lime);color:var(--lime-ink);padding:11px 20px;font-size:0.95rem;min-height:44px;}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--line);padding:10px 16px;font-size:0.88rem;min-height:40px;}
  .btn-danger{background:var(--danger);color:#2a0a0a;padding:10px 16px;font-size:0.88rem;min-height:40px;}

  input,select{
    font-family:inherit;border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;font-size:0.92rem;background:var(--panel2);color:var(--text);width:100%;
  }
  input::placeholder{color:var(--text-dim);}
  label{font-size:0.68rem;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}

  #app{flex:1;display:flex;flex-direction:column;min-height:0;}

  #tabBar{flex:0 0 auto;display:flex;gap:6px;padding:8px 12px;}
  .tabBtn{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text-dim);border-radius:9px;padding:8px 2px;font-size:0.72rem;font-weight:700;min-height:38px;}
  .tabBtn.active{background:var(--panel2);color:var(--lime);border-color:var(--lime);}

  #statusBar{flex:0 0 auto;font-size:0.74rem;color:var(--danger);padding:0 16px;min-height:0;}
  #statusBar.hasmsg{padding-bottom:4px;}

  #tabContent{flex:1;min-height:0;}
  .tabPanel{height:100%;overflow-y:auto;padding:6px 14px 14px;}
  .tabPanel.flex-col{display:flex;flex-direction:column;overflow:hidden;padding:6px 14px 10px;}
  .hidden{display:none !important;}

  /* ---------- Resumo ---------- */
  .hero-add{
    background:linear-gradient(135deg, var(--lime) 0%, var(--teal) 100%);
    border-radius:16px;
    padding:14px 16px 16px;
    margin-bottom:6px;
    box-shadow:0 6px 18px rgba(126,156,131,.3);
  }
  .hero-label{font-size:0.72rem;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:.05em;font-weight:800;margin-bottom:8px;}
  .hero-input-row{display:flex;align-items:baseline;gap:8px;margin-bottom:9px;}
  .hero-input-row input#novoPeso{
    background:rgba(255,255,255,.95);border:none;border-radius:10px;
    font-family:var(--font-mono);font-size:2.1rem;font-weight:700;color:var(--text);
    padding:6px 12px;width:165px;text-align:right;
  }
  .hero-input-row input#novoPeso:focus{outline:2px solid rgba(255,255,255,.8);}
  .hero-unit{font-size:1.15rem;font-weight:800;color:#fff;}
  .hero-nota{background:rgba(255,255,255,.5);border:none;color:var(--text);margin-bottom:10px;}
  .hero-nota::placeholder{color:rgba(62,58,50,.6);}
  .hero-btn{width:100%;background:#fff;color:#3E5B43;font-weight:800;font-size:1.02rem;padding:14px;border-radius:11px;min-height:52px;}
  .hero-btn:active{transform:scale(0.98);}

  #statusStrip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:1px 2px 9px;}
  .cur-weight{font-size:0.85rem;color:var(--text);}
  .cur-weight b{font-family:var(--font-mono);font-size:1.05rem;margin-right:3px;}
  .cur-weight small{color:var(--text-dim);font-size:0.72rem;}
  .mini-badge{font-size:0.72rem;font-weight:800;padding:2px 8px;border-radius:999px;}
  .mini-badge.same{color:var(--text-dim);background:var(--panel2);}
  .mini-badge.down{color:var(--ok);background:var(--ok-tint);}
  .mini-badge.up{color:var(--danger);background:var(--danger-tint);}
  .mini-badge.streak{color:var(--amber);background:var(--amber-tint);}
  .mini-badge.record{color:#3E5B43;background:var(--ok-tint);}
  .mini-badge:empty{display:none;}

  .stat-strip-2 .stat-chip{padding:9px 10px;}
  .stat-strip-2 .stat-chip .val{font-size:1.15rem;}
  .stat-strip-2 .stat-chip .val-sub{font-size:0.62rem;color:var(--text-dim);font-weight:600;margin-top:1px;}

  .stat-strip{display:flex;gap:6px;margin-bottom:10px;}
  .stat-chip{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 9px;min-width:0;}
  .stat-chip .lbl{font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stat-chip .val{font-family:var(--font-mono);font-size:1.05rem;font-weight:700;margin-top:1px;}
  .stat-chip .val.loss{color:var(--ok);}
  .stat-chip .val.gain{color:var(--danger);}

  .progress-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:10px;}
  .progress-head{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;}
  .progress-head span:last-child{color:var(--text);font-weight:800;font-size:0.85rem;}
  .progress-track{background:var(--panel2);border-radius:999px;height:15px;overflow:hidden;border:1px solid var(--line);}
  .progress-fill{
    height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--mint),var(--teal),var(--lime));
    background-size:300% 100%;
    transition:width .6s cubic-bezier(.4,0,.2,1);
    animation:progressFlow 6s ease infinite;
  }
  @keyframes progressFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  .progress-foot{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--text-dim);margin-top:5px;}

  .chip-row{display:flex;gap:8px;}
  .chip{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:0;}
  .chip-label{font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;}
  .chip-value{font-family:var(--font-mono);font-size:1.3rem;font-weight:700;margin-top:2px;}
  .chip-value-sm{font-size:0.98rem;}
  .chip-unit{font-family:var(--font-sans);font-size:0.62em;font-weight:600;color:var(--text-dim);}

  .hint-btn{
    background:none;border:none;padding:0 0 0 2px;margin:0;
    color:var(--text-dim);opacity:0.65;font-size:0.85em;
    min-height:auto;line-height:1;vertical-align:middle;cursor:pointer;
  }
  .hint-btn:active{opacity:1;color:var(--lime);}

  #hintOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;z-index:25;}
  #hintOverlay.hidden{display:none;}
  #hintBox{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:480px;margin:0 auto;}
  #hintTitle{font-size:0.95rem;font-weight:800;color:var(--text);margin-bottom:6px;}
  #hintText{font-size:0.85rem;color:var(--text-dim);line-height:1.5;margin-bottom:14px;}
  #hintClose{width:100%;}
  .chip-sub{font-size:0.66rem;color:var(--text-dim);margin-top:2px;}
  .imc-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:0.68rem;font-weight:800;margin-top:2px;}

  /* ---------- Gráfico ---------- */
  #periodBar{flex:0 0 auto;display:flex;gap:5px;margin-bottom:8px;}
  .periodBtn{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text-dim);border-radius:8px;padding:7px 2px;font-size:0.68rem;font-weight:700;min-height:32px;}
  .periodBtn.active{background:var(--panel2);color:var(--teal);border-color:var(--teal);}
  #forecastBar{flex:0 0 auto;font-size:0.72rem;color:var(--text-dim);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:6px 10px;margin-bottom:8px;}
  #forecastBar b{color:var(--teal);font-weight:800;}
  .chart-wrap{flex:1;min-height:0;position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;}
  .chart-wrap canvas{width:100% !important;height:100% !important;}

  /* ---------- Registos ---------- */
  #regHeader{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 2px 8px;}
  #regCount{font-size:0.72rem;color:var(--text-dim);}
  .btn-export{padding:6px 12px;font-size:0.72rem;min-height:30px;display:inline-flex;align-items:center;}
  .reg-list{flex:1;min-height:0;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:2px 12px;}
  .regRow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);position:relative;}
  .regRow:last-child{border-bottom:none;}
  .regRow.monday{background:var(--amber-tint);margin:0 -12px;padding:8px 12px;border-left:3px solid var(--amber);border-bottom:1px solid transparent;}
  .regDate{flex:1;min-width:0;}
  .regDate .d1{font-weight:700;font-size:0.86rem;display:flex;align-items:center;gap:6px;}
  .seg-tag{font-size:0.58rem;font-weight:800;color:var(--amber);background:rgba(245,185,66,.18);padding:1px 5px;border-radius:5px;letter-spacing:.03em;}
  .regDate .d2{font-size:0.68rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .regPeso{font-family:var(--font-mono);font-weight:700;font-size:0.95rem;min-width:58px;text-align:right;}
  .regDelta{font-size:0.68rem;font-weight:800;min-width:46px;text-align:right;}
  .regDelta.up{color:var(--danger);}
  .regDelta.down{color:var(--ok);}
  .regDelta.same{color:var(--text-dim);}
  .regActions{display:flex;gap:2px;}
  .iconBtn{background:none;border:none;padding:5px;min-height:auto;cursor:pointer;color:var(--text-dim);display:flex;align-items:center;justify-content:center;}
  .iconBtn:hover{color:var(--lime);}

  /* ---------- Config ---------- */
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 10px;margin-bottom:12px;}
  .cfg-grid .field.full{grid-column:1/-1;}

  /* ---------- Modal ---------- */
  #modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:20;}
  #modalOverlay.hidden{display:none;}
  #modalBox{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));width:100%;max-width:480px;margin:0 auto;}
  #modalBox h3{margin:0 0 12px;font-size:1rem;color:var(--text);}
  #modalBox .field{margin-bottom:10px;}
  #modalBtns{display:flex;gap:8px;margin-top:12px;}
  #modalBtns button{flex:1;}

  footer{
    flex:0 0 auto;
    margin-top:auto;
    padding:2px 16px calc(2px + env(safe-area-inset-bottom));
    text-align:center;font-size:0.64rem;color:var(--text-dim);
    border-top:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  }
  .footer-logo{height:36px;width:auto;display:block;opacity:0.85;}

  #undoToast{
    position:fixed;left:50%;bottom:calc(48px + env(safe-area-inset-bottom));
    transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;
    padding:10px 12px 10px 16px;display:flex;align-items:center;gap:14px;
    box-shadow:0 6px 20px rgba(0,0,0,.4);
    width:calc(100% - 32px);max-width:448px;z-index:30;
  }
  #undoToast.hidden{display:none;}
  #undoToastMsg{font-size:0.82rem;color:var(--text);flex:1;}
  #undoToastBtn{background:none;border:none;color:var(--lime);font-weight:800;font-size:0.82rem;padding:4px 6px;min-height:auto;}

  .lcd-record{font-size:0.68rem;color:var(--amber);margin-top:3px;font-weight:800;}
  .min-tag{font-size:0.58rem;font-weight:800;color:#556066;background:var(--amber);padding:1px 5px;border-radius:5px;letter-spacing:.03em;}
</style>
</head>
<body>
<div id="bgWatermark" aria-hidden="true"></div>


<header>
  <div class="brand"><span class="ico">⚖</span> Peso</div>
  <div class="sub" id="headerSub">controlo diário</div>
</header>

<div id="authArea">
  <p>Inicia sessão para aceder aos teus registos.</p>
  <button id="signinBtn" class="btn-lime">Iniciar sessão com Google</button>
</div>

<div id="app" class="hidden">
  <div id="tabBar">
    <button class="tabBtn active" id="tabBtnResumo">Resumo</button>
    <button class="tabBtn" id="tabBtnGrafico">Gráfico</button>
    <button class="tabBtn" id="tabBtnRegistos">Registos</button>
    <button class="tabBtn" id="tabBtnConfig">Config</button>
  </div>
  <div id="statusBar"></div>

  <div id="tabContent">

    <!-- ===== RESUMO ===== -->
    <section id="tabResumo" class="tabPanel">

      <div class="hero-add">
        <div class="hero-label">Registar peso de hoje</div>
        <div class="hero-input-row">
          <input type="number" step="0.1" id="novoPeso" placeholder="0.0" inputmode="decimal">
          <span class="hero-unit">kg</span>
        </div>
        <input type="text" id="novaNota" class="hero-nota" placeholder="nota (opcional)">
        <button id="btnRegistar" class="hero-btn">Registar peso</button>
      </div>

      <div id="statusStrip">
        <span class="cur-weight"><b id="lcdPeso">—</b><small>kg atual</small></span>
        <span class="mini-badge same" id="lcdDelta">—</span>
        <span class="mini-badge streak" id="lcdStreak"></span>
        <span class="mini-badge record" id="lcdRecord"></span>
      </div>

      <div class="stat-strip stat-strip-2" id="statStrip"></div>

      <div class="progress-block" id="progressCard">
        <div class="progress-head"><span>Objetivo <button class="hint-btn" data-hint="objetivo">ⓘ</button></span><span id="progPctLabel">—</span></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-foot"><span id="progLeft"></span><span id="progRight"></span></div>
      </div>

      <div class="chip-row">
        <div class="chip">
          <div class="chip-label">IMC <button class="hint-btn" data-hint="imc">ⓘ</button></div>
          <div class="chip-value" id="imcValue">—</div>
          <div id="imcClasse"></div>
        </div>
        <div class="chip">
          <div class="chip-label">Gasto diário <button class="hint-btn" data-hint="kcal">ⓘ</button></div>
          <div class="chip-value" id="kcalValue">—</div>
          <div class="chip-sub">TDEE estimado</div>
        </div>
        <div class="chip">
          <div class="chip-label">Mín / Máx <button class="hint-btn" data-hint="minmax">ⓘ</button></div>
          <div class="chip-value chip-value-sm" id="minMaxValue">—</div>
          <div class="chip-sub">desde o início</div>
        </div>
      </div>
    </section>

    <!-- ===== GRÁFICO ===== -->
    <section id="tabGrafico" class="tabPanel flex-col hidden">
      <div id="periodBar">
        <button class="periodBtn active" data-period="all">Sempre</button>
        <button class="periodBtn" data-period="year">Ano</button>
        <button class="periodBtn" data-period="month">Mês</button>
        <button class="periodBtn" data-period="week">Semana</button>
      </div>
      <div id="forecastBar"></div>
      <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </section>

    <!-- ===== REGISTOS ===== -->
    <section id="tabRegistos" class="tabPanel flex-col hidden">
      <div id="regHeader">
        <span id="regCount"></span>
        <button class="btn-ghost btn-export" id="btnExportar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M4 21h16"/></svg>Excel
        </button>
      </div>
      <div class="reg-list" id="registosList"></div>
    </section>

    <!-- ===== CONFIG ===== -->
    <section id="tabConfig" class="tabPanel hidden">
      <div class="cfg-grid">
        <div class="field"><label>Altura (cm)</label><input type="number" id="cfgAltura" placeholder="178"></div>
        <div class="field"><label>Peso alvo (kg)</label><input type="number" step="0.1" id="cfgPesoAlvo" placeholder="90"></div>
        <div class="field"><label>Nascimento</label><input type="date" id="cfgNascimento"></div>
        <div class="field"><label>Sexo</label>
          <select id="cfgSexo"><option value="">—</option><option value="M">M</option><option value="F">F</option></select>
        </div>
        <div class="field full"><label>Nível de atividade</label>
          <select id="cfgAtividade">
            <option value="1.2">Pouco ativo</option>
            <option value="1.45">Moderadamente ativo</option>
            <option value="1.7">Muito ativo</option>
          </select>
        </div>
      </div>
      <button class="btn-lime" id="btnGuardarConfig" style="width:100%;">Guardar configuração</button>
      <button class="btn-ghost" id="btnTerminarSessao" style="width:100%;margin-top:8px;">Terminar sessão</button>
    </section>

  </div>
</div>

<div id="modalOverlay" class="hidden">
  <div id="modalBox">
    <h3>Editar registo</h3>
    <div class="field"><label>Peso (kg)</label><input type="number" step="0.1" id="editPeso"></div>
    <div class="field"><label>Nota</label><input type="text" id="editNota"></div>

function setStatus(msg, isErr=false){
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.classList.toggle('hasmsg', !!msg);
  el.style.color = isErr ? 'var(--danger)' : 'var(--text-dim)';
}

/* ---------- Auth ---------- */
/* ---------- Sessão persistente ---------- */
const TOKEN_KEY = 'peso_access_token';
const TOKEN_EXPIRY_KEY = 'peso_token_expiry';

function saveToken(token, expiresInSeconds){
  try{
    localStorage.setItem(TOKEN_KEY, token);
    // margem de 2 min de segurança antes do expirar real
    localStorage.setItem(TOKEN_EXPIRY_KEY, String(Date.now() + (expiresInSeconds || 3600) * 1000 - 120000));
  } catch(e){}
}
function loadSavedToken(){
  try{
    const token = localStorage.getItem(TOKEN_KEY);
    const expiry = Number(localStorage.getItem(TOKEN_EXPIRY_KEY) || 0);
    if (token && expiry > Date.now()) return token;
  } catch(e){}
  return null;
}
function clearSavedToken(){
  try{
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_EXPIRY_KEY);
  } catch(e){}
}

window.onload = () => {
  document.getElementById('footerVersion').textContent = APP_VERSION;

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error){
        // uma tentativa silenciosa que falhe não deve mostrar erro — só se for um clique manual
        if (resp.error !== 'interaction_required' && resp.error !== 'access_denied'){
          setStatus('Falha no login: ' + resp.error, true);
        }
        return;
      }
      accessToken = resp.access_token;
      saveToken(accessToken, resp.expires_in);
      onSignedIn();
    }
  });
  document.getElementById('signinBtn').onclick = () => tokenClient.requestAccessToken();
  document.getElementById('btnTerminarSessao').onclick = onTerminarSessao;

  document.getElementById('tabBtnGrafico').onclick = () => showTab('grafico');

  document.getElementById('tabBtnConfig').onclick = () => showTab('config');

  document.getElementById('btnRegistar').onclick = onRegistarNovo;
  document.getElementById('btnGuardarConfig').onclick = onGuardarConfig;

      document.querySelectorAll('.periodBtn').forEach(b => b.classList.remove('active'));

      currentPeriod = btn.dataset.period;
      renderChart();

  } else {

    setTimeout(() => {

    }, 150);
  }
};

/* ---------- Animação de contagem dos números (só no carregamento inicial) ---------- */
let animateNumbersNow = false;
function animateValues(el, targets, formatFn, duration = 900){
  if (!el) return;
  if (!animateNumbersNow){ el.innerHTML = formatFn(targets); return; }
  const start = performance.now();
  function tick(now){
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
    const current = targets.map(v => v * eased);
    el.innerHTML = formatFn(current);
    if (t < 1) requestAnimationFrame(tick);
    else el.innerHTML = formatFn(targets);
  }
  requestAnimationFrame(tick);
}

/* ---------- Sheets API helpers ---------- */
async function sheetsGet(range){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`;
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (res.status === 401){ onSessaoExpirada(); throw new Error('Sessão expirada'); }
  if (!res.ok) throw new Error('Erro a ler a folha (' + res.status + ')');
  return res.json();
}

async function sheetsPut(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, values })
  });
  if (res.status === 401){ onSessaoExpirada(); throw new Error('Sessão expirada'); }
  if (!res.ok) throw new Error('Erro a gravar (' + res.status + ')');
  return res.json();
}

async function sheetsAppend(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, values })
  });
  if (res.status === 401){ onSessaoExpirada(); throw new Error('Sessão expirada'); }
  if (!res.ok) throw new Error('Erro a adicionar (' + res.status + ')');
  return res.json();
}

// token rejeitado a meio do uso: limpa a sessão guardada e volta ao ecrã de login

/* ---------- Date helpers (serial <-> Date) ---------- */
function serialToDate(v){
  if (typeof v === 'number') {
    return new Date(Date.UTC(1899, 11, 30) + Math.round(v * 86400000));
  }
  if (typeof v === 'string' && v.trim() !== '') {
    const d = new Date(v.replace(' ', 'T'));
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}

/* ---------- Nível de atividade: aceita escala 1-4 antiga ou multiplicador decimal ---------- */
function normalizaAtividade(raw){
  if (!raw || isNaN(raw)) return 1.2;
  const escala = { 1: 1.2, 2: 1.45, 3: 1.7, 4: 1.7 };
  if (Number.isInteger(raw) && escala[raw]) return escala[raw];
  if (raw >= 1.2 && raw <= 1.725) {
    // aproxima ao valor válido mais próximo da nova escala (também cobre valores antigos: 1.375/1.55/1.725)
    const validos = [1.2, 1.45, 1.7];
    return validos.reduce((a,b) => Math.abs(b-raw) < Math.abs(a-raw) ? b : a, 1.2);
  }
  return 1.2;
}

/* ---------- Load Config ---------- */
async function loadConfig(){
  try{
    const data = await sheetsGet(`${SHEET_CONFIG}!B2:B6`);
    const v = data.values || [];
    config.altura = v[0] && v[0][0] !== '' ? Number(v[0][0]) : null;
    const nasc = v[1] ? v[1][0] : '';
    if (typeof nasc === 'number') {
      config.nascimento = serialToDate(nasc);
    } else if (typeof nasc === 'string' && nasc.trim() !== '') {
      const d = new Date(nasc);
      config.nascimento = isNaN(d.getTime()) ? null : d;
    } else {
      config.nascimento = null;
    }
    config.sexo = v[2] ? String(v[2][0]) : '';
    config.pesoAlvo = v[3] && v[3][0] !== '' ? Number(v[3][0]) : null;
    const atividadeRaw = v[4] && v[4][0] !== '' ? Number(v[4][0]) : 1.2;
    config.atividade = normalizaAtividade(atividadeRaw);
  } catch(e){
    setStatus('Não foi possível ler a Config: ' + e.message, true);
  }
  document.getElementById('cfgAltura').value = config.altura ?? '';
  document.getElementById('cfgNascimento').value = config.nascimento ? isoDateOnly(config.nascimento) : '';
  document.getElementById('cfgSexo').value = config.sexo || '';
  document.getElementById('cfgPesoAlvo').value = config.pesoAlvo ?? '';
  document.getElementById('cfgAtividade').value = config.atividade;
}

function isoDateOnly(d){
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n){ return n.toString().padStart(2,'0'); }

/* ---------- Load Registos ---------- */
async function loadRegistos(){
  registos = [];
  try{
    const data = await sheetsGet(`${SHEET_REGISTOS}!A2:C100000`);
    const v = data.values || [];
    v.forEach((row, i) => {
      const dateVal = row[0];
      const pesoVal = row[1];
      if (dateVal === undefined || dateVal === '' || pesoVal === undefined || pesoVal === '') return;
      const d = serialToDate(dateVal);
      const p = Number(pesoVal);
      if (!d || isNaN(p)) return;
      registos.push({ row: i + 2, date: d, peso: p, nota: row[2] || '' });
    });
    registos.sort((a,b) => a.date - b.date);
  } catch(e){
    setStatus('Não foi possível ler os Registos: ' + e.message, true);
  }
}

async function onRegistarNovo(){
  const pesoStr = document.getElementById('novoPeso').value;
  const nota = document.getElementById('novaNota').value;

  if (!pesoStr || isNaN(peso) || peso <= 0){
    setStatus('Introduz um peso válido.', true);
    return;
  }
  const LIMITE_AVISO = 5; // kg
  if (registos.length > 0){
    const ultimoPeso = registos[registos.length - 1].peso;
    const diff = Math.abs(peso - ultimoPeso);
    if (diff > LIMITE_AVISO){
      const ok = confirm(`Este peso (${peso} kg) difere ${diff.toFixed(1)} kg do último registo (${ultimoPeso} kg). Confirmas que está correto?`);
      if (!ok) return;
    }
  }
  const now = new Date();
  const dataStr = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':00';
  try{
    setStatus('A gravar...');
    await sheetsAppend(`${SHEET_REGISTOS}!A:C`, [[dataStr, peso, nota]]);
    document.getElementById('novoPeso').value = '';
    document.getElementById('novaNota').value = '';
    await loadRegistos();
    setStatus('Registo adicionado.');
    renderAll();
  } catch(e){
    setStatus('Erro ao registar: ' + e.message, true);
  }
}

function iniciarEliminacao(reg){

async function commitPendingDelete(){

  const { reg, timeoutId } = pendingDelete;
  clearTimeout(timeoutId);
  pendingDelete = null;
  hideUndoToast();
  try{
    await sheetsPut(`${SHEET_REGISTOS}!A${reg.row}:C${reg.row}`, [['','','']]);

    setStatus('Erro ao eliminar: ' + e.message, true);

function undoPendingDelete(){

  clearTimeout(pendingDelete.timeoutId);
  const { reg } = pendingDelete;
  pendingDelete = null;
  hideUndoToast();
  registos.push(reg);
  registos.sort((a,b) => a.date - b.date);
  renderAll();
  setStatus('Eliminação desfeita.');
}

/* ---------- Cálculos ---------- */
function idadeAnos(nascimento){
  if (!nascimento) return null;
  const hoje = new Date();
  let idade = hoje.getFullYear() - nascimento.getFullYear();
  const m = hoje.getMonth() - nascimento.getMonth();
  if (m < 0 || (m === 0 && hoje.getDate() < nascimento.getDate())) idade--;
  return idade;
}

function calcIMC(peso, alturaCm){
  if (!peso || !alturaCm) return null;
  const alturaM = alturaCm / 100;
  return peso / (alturaM * alturaM);
}

function classificaIMC(imc){
  if (imc === null) return { texto:'—', cor:'var(--text-dim)', bg:'transparent' };
  if (imc < 18.5) return { texto:'Abaixo do peso', cor:'var(--amber)', bg:'var(--amber-tint)' };
  if (imc < 25)   return { texto:'Peso normal', cor:'var(--ok)', bg:'var(--ok-tint)' };
  if (imc < 30)   return { texto:'Excesso de peso', cor:'var(--amber)', bg:'var(--amber-tint)' };
  if (imc < 35)   return { texto:'Obesidade grau I', cor:'var(--danger)', bg:'var(--danger-tint)' };
  if (imc < 40)   return { texto:'Obesidade grau II', cor:'var(--danger)', bg:'var(--danger-tint)' };
  return { texto:'Obesidade grau III', cor:'var(--danger)', bg:'var(--danger-tint)' };
}

function calcTMB(peso, alturaCm, idade, sexo){
  if (!peso || !alturaCm || idade === null || !sexo) return null;
  const base = 10*peso + 6.25*alturaCm - 5*idade;
  return sexo === 'M' ? base + 5 : base - 161;
}

function mediaPerdaPeriodo(dias){
  if (registos.length < 2) return null;
  const agora = registos[registos.length - 1].date;
  const limite = new Date(agora.getTime() - dias*86400000);
  const noPeriodo = registos.filter(r => r.date >= limite);
  if (noPeriodo.length < 2) return null;
  const primeiro = noPeriodo[0];
  const ultimo = noPeriodo[noPeriodo.length - 1];
  const diasDecorridos = (ultimo.date - primeiro.date) / 86400000;
  if (diasDecorridos <= 0) return null;
  return (primeiro.peso - ultimo.peso) / diasDecorridos;
}

function renderLcd(){
  if (registos.length === 0){
    document.getElementById('lcdPeso').textContent = '—';
    document.getElementById('lcdDelta').textContent = '—';
    document.getElementById('lcdStreak').textContent = '';
    document.getElementById('lcdRecord').textContent = '';
    return;
  }
  const ultimo = registos[registos.length - 1];
  const anterior = registos.length > 1 ? registos[registos.length - 2] : null;
  animateValues(document.getElementById('lcdPeso'), [ultimo.peso], arr => arr[0].toFixed(1));
  const deltaEl = document.getElementById('lcdDelta');
  if (anterior){
    const diff = ultimo.peso - anterior.peso;
    if (diff > 0.001){ deltaEl.textContent = '▲ ' + diff.toFixed(1); deltaEl.className = 'mini-badge up'; }
    else if (diff < -0.001){ deltaEl.textContent = '▼ ' + Math.abs(diff).toFixed(1); deltaEl.className = 'mini-badge down'; }
    else { deltaEl.textContent = '='; deltaEl.className = 'mini-badge same'; }
  } else {
    deltaEl.textContent = 'início'; deltaEl.className = 'mini-badge same';
  }
  const streak = calcStreak();
  document.getElementById('lcdStreak').textContent = streak >= 2 ? `🔥 ${streak} dias` : '';
  document.getElementById('lcdStreak').className = 'mini-badge streak';

  const recordEl = document.getElementById('lcdRecord');
  if (registos.length > 1){
    const minGlobal = Math.min(...registos.map(r => r.peso));
    recordEl.textContent = ultimo.peso <= minGlobal + 0.001 ? '🏆 mínimo' : '';
  } else {
    recordEl.textContent = '';
  }
  recordEl.className = 'mini-badge record';
}

// dias consecutivos (calendário) com pelo menos um registo, a contar do registo mais recente
function calcStreak(){
  if (registos.length === 0) return 0;
  const dias = [...new Set(registos.map(r => isoDateOnly(r.date)))].sort().reverse();
  let streak = 1;
  let prev = new Date(dias[0]);
  for (let i = 1; i < dias.length; i++){
    const cur = new Date(dias[i]);
    const diffDias = Math.round((prev - cur) / 86400000);
    if (diffDias === 1){ streak++; prev = cur; } else break;
  }
  return streak;
}

}

// percentagem de progresso até ao objetivo (0-100), ou null se não houver dados/objetivo definido
function calcProgressPct(){
  if (registos.length === 0 || !config.pesoAlvo) return null;
  const pesoInicial = registos[0].peso;
  const pesoAtual = registos[registos.length-1].peso;
  const pesoAlvo = config.pesoAlvo;
  let pct = 0;
  if (pesoInicial !== pesoAlvo) pct = ((pesoInicial - pesoAtual) / (pesoInicial - pesoAlvo)) * 100;
  return Math.max(0, Math.min(100, pct));
}

function renderProgress(){
  if (registos.length === 0 || !config.pesoAlvo){
    document.getElementById('progPctLabel').textContent = '—';
    document.getElementById('progLeft').textContent = 'Define o peso alvo em Config';
    document.getElementById('progRight').textContent = '';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }
  const pesoInicial = registos[0].peso;
  const pesoAlvo = config.pesoAlvo;
  const pct = calcProgressPct();
  document.getElementById('progressFill').style.width = pct + '%';
  animateValues(document.getElementById('progPctLabel'), [pct], arr => arr[0].toFixed(0) + '%');
  document.getElementById('progLeft').textContent = pesoInicial.toFixed(1) + ' kg';
  document.getElementById('progRight').textContent = pesoAlvo.toFixed(1) + ' kg';
}

function renderIMC(){
  if (registos.length === 0 || !config.altura){
    document.getElementById('imcValue').textContent = '—';
    document.getElementById('imcClasse').innerHTML = '';
    return;
  }
  const pesoAtual = registos[registos.length-1].peso;
  const imc = calcIMC(pesoAtual, config.altura);
  const cls = classificaIMC(imc);
  animateValues(document.getElementById('imcValue'), [imc], arr => arr[0].toFixed(1));
  document.getElementById('imcClasse').innerHTML = `<span class="imc-badge" style="color:${cls.cor};background:${cls.bg};">${cls.texto}</span>`;
}

function renderKcal(){
  if (registos.length === 0 || !config.altura || !config.nascimento || !config.sexo){
    document.getElementById('kcalValue').textContent = '—';
    return;
  }
  const pesoAtual = registos[registos.length-1].peso;
  const idade = idadeAnos(config.nascimento);
  const tmb = calcTMB(pesoAtual, config.altura, idade, config.sexo);
  if (tmb === null){
    document.getElementById('kcalValue').textContent = '—';
    return;
  }
  const tdee = tmb * (config.atividade || 1.2);
  animateValues(document.getElementById('kcalValue'), [tdee], arr => `${Math.round(arr[0])} <span class="chip-unit">kcal</span>`);
}

function renderRegistos(){
  const list = document.getElementById('registosList');
  const countEl = document.getElementById('regCount');
  list.innerHTML = '';
  if (countEl) countEl.textContent = registos.length + (registos.length === 1 ? ' registo' : ' registos');
  if (registos.length === 0){
    list.innerHTML = '<div style="padding:12px 0;color:var(--text-dim);">Sem registos.</div>';
    return;
  }
  const desc = [...registos].sort((a,b) => b.date - a.date);
  const minGlobal = Math.min(...registos.map(r => r.peso));
  desc.forEach((reg) => {
    const idxAsc = registos.indexOf(reg);
    const anterior = idxAsc > 0 ? registos[idxAsc - 1] : null;
    let deltaHtml = '<span class="regDelta same">—</span>';
    if (anterior){
      const diff = reg.peso - anterior.peso;
      if (diff > 0.001) deltaHtml = `<span class="regDelta up">▲${diff.toFixed(1)}</span>`;
      else if (diff < -0.001) deltaHtml = `<span class="regDelta down">▼${Math.abs(diff).toFixed(1)}</span>`;
      else deltaHtml = '<span class="regDelta same">=</span>';
    }
    const isMonday = reg.date.getDay() === 1;
    const isMin = registos.length > 1 && reg.peso <= minGlobal + 0.001;
    const row = document.createElement('div');
    row.className = 'regRow' + (isMonday ? ' monday' : '');
    row.innerHTML = `
      <div class="regDate">
        <div class="d1">${fmtDataCurta(reg.date)}${isMonday ? '<span class="seg-tag">SEG</span>' : ''}${isMin ? '<span class="min-tag">🏆 MÍN</span>' : ''}</div>
        <div class="d2">${pad(reg.date.getHours())}:${pad(reg.date.getMinutes())}${reg.nota ? ' · ' + escapeHtml(reg.nota) : ''}</div>
      </div>
      <div class="regPeso">${reg.peso.toFixed(1)}</div>
      ${deltaHtml}
      <div class="regActions">
        <button class="iconBtn iconEdit" title="Editar">${ICON_EDIT}</button>
        <button class="iconBtn iconDel" title="Eliminar">${ICON_TRASH}</button>
      </div>`;
    row.querySelector('.iconEdit').onclick = () => openModal(reg);
    row.querySelector('.iconDel').onclick = () => eliminarRegistoDireto(reg);
    list.appendChild(row);
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Exportar para Excel ---------- */
function exportarXLSX(){
  if (typeof XLSX === 'undefined'){
    setStatus('Biblioteca de exportação ainda não carregou. Tenta novamente em instantes.', true);
    return;
  }
  if (registos.length === 0){
    setStatus('Não há registos para exportar.', true);
    return;
  }
  const wb = XLSX.utils.book_new();

  // ---- Folha Registos ----
  const linhasRegistos = registos.map(r => ({
    Data: fmtData(r.date),
    'Peso (kg)': r.peso,
    Nota: r.nota
  }));
  const wsRegistos = XLSX.utils.json_to_sheet(linhasRegistos);
  wsRegistos['!cols'] = [{ wch: 18 }, { wch: 10 }, { wch: 30 }];
  XLSX.utils.book_append_sheet(wb, wsRegistos, 'Registos');

  // ---- Folha Config ----
  const atividadeLabels = { 1.2: 'Pouco ativo', 1.45: 'Moderadamente ativo', 1.7: 'Muito ativo' };
  const linhasConfig = [
    { Campo: 'Altura (cm)', Valor: config.altura ?? '—' },
    { Campo: 'Data de nascimento', Valor: config.nascimento ? isoDateOnly(config.nascimento) : '—' },
    { Campo: 'Sexo', Valor: config.sexo || '—' },
    { Campo: 'Peso alvo (kg)', Valor: config.pesoAlvo ?? '—' },
    { Campo: 'Nível de atividade', Valor: atividadeLabels[config.atividade] || config.atividade || '—' },
  ];
  const wsConfig = XLSX.utils.json_to_sheet(linhasConfig);
  wsConfig['!cols'] = [{ wch: 22 }, { wch: 22 }];
  XLSX.utils.book_append_sheet(wb, wsConfig, 'Config');

  // ---- Folha Resumo (estado calculado no momento da exportação) ----
  const pesoAtual = registos[registos.length - 1].peso;
  const pesoInicial = registos[0].peso;
  const totalPerdido = pesoInicial - pesoAtual;
  const desdeInicio = mediaPerdaPeriodo(999999);
  const mediaSemanal = desdeInicio !== null ? desdeInicio * 7 : null;
  const pesos = registos.map(r => r.peso);
  const pctObjetivo = calcProgressPct();
  const imc = config.altura ? calcIMC(pesoAtual, config.altura) : null;
  const imcClasse = imc !== null ? classificaIMC(imc).texto : '—';
  const idade = config.nascimento ? idadeAnos(config.nascimento) : null;
  const tmb = (config.altura && idade !== null && config.sexo) ? calcTMB(pesoAtual, config.altura, idade, config.sexo) : null;
  const tdee = tmb !== null ? Math.round(tmb * (config.atividade || 1.2)) : null;

  const linhasResumo = [
    { Métrica: 'Data de exportação', Valor: fmtData(new Date()) },
    { Métrica: 'Peso inicial (kg)', Valor: pesoInicial.toFixed(1) },
    { Métrica: 'Peso atual (kg)', Valor: pesoAtual.toFixed(1) },
    { Métrica: 'Total perdido (kg)', Valor: totalPerdido.toFixed(1) },
    { Métrica: 'Mínimo registado (kg)', Valor: Math.min(...pesos).toFixed(1) },
    { Métrica: 'Máximo registado (kg)', Valor: Math.max(...pesos).toFixed(1) },
    { Métrica: 'Ritmo médio (kg/dia)', Valor: desdeInicio !== null ? desdeInicio.toFixed(3) : '—' },
    { Métrica: 'Ritmo médio (kg/semana)', Valor: mediaSemanal !== null ? mediaSemanal.toFixed(2) : '—' },
    { Métrica: 'Progresso até ao objetivo (%)', Valor: pctObjetivo !== null ? pctObjetivo.toFixed(0) : '—' },
    { Métrica: 'IMC', Valor: imc !== null ? imc.toFixed(1) : '—' },
    { Métrica: 'Classificação IMC', Valor: imcClasse },
    { Métrica: 'Gasto diário estimado (kcal)', Valor: tdee !== null ? tdee : '—' },
    { Métrica: 'Total de registos', Valor: registos.length },
  ];
  const wsResumo = XLSX.utils.json_to_sheet(linhasResumo);
  wsResumo['!cols'] = [{ wch: 30 }, { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, wsResumo, 'Resumo');

  const nomeFicheiro = `peso-export-${isoDateOnly(new Date())}.xlsx`;
  XLSX.writeFile(wb, nomeFicheiro);
  setStatus('Ficheiro exportado: ' + nomeFicheiro);
}

// média móvel de 7 dias (janela de calendário, não apenas últimos N registos) — suaviza o ruído diário
function movingAverageSeries(dados, windowDays = 7){
  return dados.map((r) => {
    const inicioJanela = new Date(r.date.getTime() - (windowDays - 1) * 86400000);
    const naJanela = dados.filter(x => x.date >= inicioJanela && x.date <= r.date);
    const media = naJanela.reduce((s, x) => s + x.peso, 0) / naJanela.length;
    return { date: r.date, media };
  });
}

function renderForecast(){
  const el = document.getElementById('forecastBar');
  if (!el) return;
  if (registos.length < 2){
    el.textContent = 'Regista mais alguns pesos para veres uma previsão.';
    return;
  }
  if (!config.pesoAlvo){
    el.textContent = 'Define o peso alvo em Config para veres uma previsão de data.';
    return;
  }
  const pesoAtual = registos[registos.length - 1].peso;
  if (pesoAtual <= config.pesoAlvo){
    el.innerHTML = '🎉 <b>Objetivo já atingido!</b>';
    return;
  }
  const ritmo = mediaPerdaPeriodo(30) ?? mediaPerdaPeriodo(999999);
  if (ritmo === null || ritmo <= 0.001){
    el.textContent = 'Sem tendência de perda clara nos últimos registos — sem previsão de data.';
    return;
  }
  const diasRestantes = Math.ceil((pesoAtual - config.pesoAlvo) / ritmo);
  const dataPrevista = new Date(registos[registos.length - 1].date.getTime() + diasRestantes * 86400000);
  el.innerHTML = `Ao ritmo atual (~${(ritmo*7).toFixed(2)} kg/sem): objetivo previsto para <b>${fmtDataCurta(dataPrevista)}</b>`;
}

function renderChart(entrando = false){
  renderForecast();
  const ctx = document.getElementById('weightChart');
  if (!ctx || registos.length === 0) return;
  let filtrado = registos;
  const agora = registos[registos.length-1].date;
  if (currentPeriod === 'year'){
    const limite = new Date(agora); limite.setFullYear(limite.getFullYear() - 1);
    filtrado = registos.filter(r => r.date >= limite);
  } else if (currentPeriod === 'month'){
    const limite = new Date(agora); limite.setMonth(limite.getMonth() - 1);
    filtrado = registos.filter(r => r.date >= limite);
  } else if (currentPeriod === 'week'){
    const limite = new Date(agora.getTime() - 7*86400000);
    filtrado = registos.filter(r => r.date >= limite);
  }
  const labels = filtrado.map(r => fmtDataCurta(r.date));
  const dados = filtrado.map(r => r.peso);

  // média móvel calculada sobre TODO o histórico (janelas corretas), depois recortada ao período visível
  const mediasCompletas = movingAverageSeries(registos);
  const datasFiltradas = new Set(filtrado.map(r => r.date.getTime()));
  const mediasFiltradas = mediasCompletas.filter(m => datasFiltradas.has(m.date.getTime())).map(m => m.media);

  const canvasCtx = ctx.getContext('2d');
  const alturaCanvas = ctx.clientHeight || 280;
  const gradienteArea = canvasCtx.createLinearGradient(0, 0, 0, alturaCanvas);
  gradienteArea.addColorStop(0, 'rgba(79,141,116,0.40)');
  gradienteArea.addColorStop(0.6, 'rgba(79,141,116,0.10)');
  gradienteArea.addColorStop(1, 'rgba(79,141,116,0.0)');

  const gradienteLinha = canvasCtx.createLinearGradient(0, 0, ctx.clientWidth || 300, 0);
  gradienteLinha.addColorStop(0, '#6FAF8F');
  gradienteLinha.addColorStop(1, '#4F8D74');

  // ---- Já existe gráfico e não é uma entrada na aba: só atualizar dados, com transição suave ----
  if (weightChart && !entrando){
    weightChart.data.labels = labels;
    weightChart.data.datasets[0].data = dados;
    weightChart.data.datasets[0].borderColor = gradienteLinha;
    weightChart.data.datasets[0].backgroundColor = gradienteArea;
    weightChart.data.datasets[1].data = mediasFiltradas;
    weightChart.options.animation = { duration: 550, easing: 'easeOutQuart' };
    weightChart.update();
    return;
  }

  // ---- Entrada na aba (ou primeira vez): recriar com desenho progressivo, ponto a ponto ----
  if (weightChart) weightChart.destroy();

  const duracaoTotal = 1100;
  const atrasoPorPonto = dados.length ? duracaoTotal / dados.length : 0;
  const previousY = (context) => {
    if (context.index === 0) return context.chart.scales.y.getPixelForValue(context.dataset.data[0]);
    const meta = context.chart.getDatasetMeta(context.datasetIndex);
    const anterior = meta.data[context.index - 1];
    return anterior ? anterior.getProps(['y'], true).y : context.chart.scales.y.getPixelForValue(context.dataset.data[0]);
  };

  weightChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Peso (kg)',
          data: dados,
          borderColor: gradienteLinha,
          backgroundColor: gradienteArea,
          borderWidth: 2.5,
          tension: 0.25,
          pointRadius: 2,
          pointBackgroundColor: '#4F8D74',
          fill: true,
          order: 2,
        },
        {
          label: 'Média 7 dias',
          data: mediasFiltradas,
          borderColor: '#D69E4D',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [4, 3],
          tension: 0.3,
          pointRadius: 0,
          fill: false,
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        x: {
          type: 'number', easing: 'linear', duration: atrasoPorPonto,
          from: NaN,
          delay(context){
            if (context.type !== 'data' || context.xStarted) return 0;
            context.xStarted = true;
            return context.index * atrasoPorPonto;
          }
        },
        y: {
          type: 'number', easing: 'linear', duration: atrasoPorPonto,
          from: previousY,
          delay(context){
            if (context.type !== 'data' || context.yStarted) return 0;
            context.yStarted = true;
            return context.index * atrasoPorPonto;
          }
        }
      },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 6, font: { size: 9 }, color: '#8B979C' }, grid: { color: '#DCE7E0' } },
        y: { ticks: { font: { size: 9 }, color: '#8B979C' }, grid: { color: '#DCE7E0' } }
      }
    }
  });
}
