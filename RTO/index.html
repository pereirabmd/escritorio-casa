<style>
  :root{
    --ink:#1c2430;
    --paper:#f6f4ef;
    --line:#dcd7cc;
    --brand:#3a6b8e;
    --brand-light:#6faede;
    --brand-tint:#d9e8f5;
    --t-color:#6faede;
    --t-tint:#d9e8f5;
    --c-color:#e0762c;
    --c-tint:#fbe9d9;
    --f-color:#2f8a52;
    --f-tint:#dcefdd;
    --a-color:#8e5fd1;
    --a-tint:#ece3f8;
    --h-color:#c94b3f;
    --h-tint:#fbdedb;
    --ok:#2f8a52;
    --bad:#c94b3f;
    --accent:#1c2430;
  }
  *{box-sizing:border-box;}
  html{background:var(--paper);}
  body{
    margin:0 auto;
    max-width:480px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
  }
  header{
    padding:calc(18px + env(safe-area-inset-top)) 18px 14px;
    border-bottom:2px solid var(--brand-light);
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:5;
  }
  #bgWatermark{
    position:fixed;
    top:-30px; right:-70px;
    width:260px; height:260px;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:top right;
    z-index:-1;
    pointer-events:none;
  }
  #brandRow{display:flex;align-items:center;gap:12px;}
  #logoImg{height:36px;width:auto;flex-shrink:0;}
  h1{
    font-size:1.6rem;
    font-weight:800;
    color:var(--brand);
    margin:0;
    letter-spacing:-0.01em;
  }
  .sub{
    font-size:0.82rem;
    color:#6b6558;
  }
  #authArea{padding:40px 18px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
  button{
    font-family:inherit;
    border:none;
    border-radius:10px;
    padding:11px 18px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    min-height:44px;
  }
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-primary:disabled{opacity:0.5;cursor:default;}

  #tabBar{
    display:flex;
    gap:8px;
    padding:14px 18px 0;
  }
  .tabBtn{
    flex:1;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    font-weight:600;
    font-size:0.88rem;
    color:#6b6558;
    min-height:44px;
  }
  .tabBtn.active{background:var(--brand);color:#fff;border-color:var(--brand);}

  #totals{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:14px 18px 4px;
  }
  .stat{
    background:#fff;
    border:1px solid var(--line);
    border-left:4px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    transition:border-color .15s ease, background .15s ease;
  }
  .stat .label{font-size:0.72rem;color:#6b6558;text-transform:uppercase;letter-spacing:.04em;}
  .stat .value{font-size:1.35rem;font-weight:700;margin-top:2px;}
  .stat .sub2{font-size:0.72rem;color:#a29c8c;margin-top:2px;}
  .statBtn{
    font-family:inherit;
    cursor:pointer;
    text-align:center;
    line-height:1.5;
    font-size:0.8rem;
    font-weight:700;
    color:var(--ink);
    border-left-color:var(--brand);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }
  .statBtn:hover{background:var(--brand-tint);}

  .stat.t{border-left-color:var(--t-color);}
  .stat.t .value{color:var(--t-color);}

  /* Dias em casa: semáforo consoante % da quota anual usada */
  .stat.c{border-left-color:var(--c-color);}
  .stat.c .value{color:var(--c-color);}
  .stat.c.warn{border-left-color:#c98a1f;background:#fdf6e6;}
  .stat.c.warn .value{color:#a8690f;}
  .stat.c.over{border-left-color:var(--bad);background:var(--h-tint);}
  .stat.c.over .value{color:var(--bad);}

  /* Saldos: semáforo a 3 níveis */
  .stat.saldo-ok{border-left-color:var(--ok);}
  .stat.saldo-ok .value{color:var(--ok);}
  .stat.saldo-warn{border-left-color:#c98a1f;background:#fdf6e6;}
  .stat.saldo-warn .value{color:#a8690f;}
  .stat.saldo-bad{border-left-color:var(--bad);background:var(--h-tint);}
  .stat.saldo-bad .value{color:var(--bad);}

  #monthNav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    padding:16px 18px 6px;
  }
  #monthLabel{font-size:1.05rem;font-weight:700;flex:1;text-align:center;}
  #todayBtn{padding:8px 14px;font-size:0.8rem;min-height:36px;flex-shrink:0;}
  #monthNav button{
    background:#fff;border:1px solid var(--line);
    width:44px;height:44px;min-height:44px;border-radius:50%;
    font-size:1.1rem;line-height:1;padding:0;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  #legend{
    display:flex;flex-wrap:wrap;justify-content:center;text-align:center;gap:12px;
    padding:2px 18px 10px;
    font-size:0.76rem;color:#6b6558;
  }
  #legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.t{background:var(--t-color);}
  .dot.c{background:var(--c-color);}
  .dot.f{background:var(--f-color);}
  .dot.a{background:var(--a-color);}
  .dot.h{background:var(--h-color);}

  #yearBanner{
    margin:0 18px 10px;
    background:#fff3d6;
    border:1px solid #e8c974;
    border-radius:10px;
    padding:10px 12px;
    font-size:0.82rem;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }
  #yearBanner button{padding:8px 12px;font-size:0.82rem;min-height:36px;}

  #feriasModeRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:0 18px 10px;
    font-size:0.8rem;
    color:#6b6558;
  }
  .switch{position:relative;display:inline-block;width:44px;height:26px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;position:absolute;}
  .switch .slider{
    position:absolute;inset:0;
    background:#d9d4c7;border-radius:999px;
    transition:background .15s ease;
    cursor:pointer;
  }
  .switch .slider::before{
    content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;
    background:#fff;border-radius:50%;
    box-shadow:0 1px 2px rgba(0,0,0,.25);
    transition:transform .15s ease;
  }
  .switch input:checked + .slider{background:var(--brand);}
  .switch input:checked + .slider::before{transform:translateX(18px);}

  #calendar{
    padding:0 18px 20px;
  }
  .weekhead{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:0.72rem;
    color:#a29c8c;
    margin-bottom:6px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .day{
    aspect-ratio:1;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:0.8rem;
    cursor:pointer;
    user-select:none;
    position:relative;
    transition:transform .08s ease;
  }
  .day:active{transform:scale(0.93);}
  .day.empty{visibility:hidden;cursor:default;}
  .day.weekend{background:#efece4;cursor:default;}
  .day.locked{opacity:0.4;cursor:default;}
  .day .num{font-weight:600;}
  .day .mark{font-size:0.68rem;font-weight:700;letter-spacing:.03em;margin-top:1px;}
  .day.T{background:var(--t-tint);border-color:var(--t-color);color:var(--t-color);}
  .day.C{background:var(--c-tint);border-color:var(--c-color);color:var(--c-color);}
  .day.F{background:var(--f-tint);border-color:var(--f-color);color:var(--f-color);}
  .day.A{background:var(--a-tint);border-color:var(--a-color);color:var(--a-color);}
  .day.holiday{background:var(--h-tint);border-color:var(--h-color);color:var(--h-color);}
  .mark .hf{color:var(--h-color);}
  .day.today{
    box-shadow:0 0 0 2px var(--brand) inset;
    animation:todayPulse 2.4s ease-in-out infinite;
  }
  @keyframes todayPulse{
    0%,100%{ box-shadow:0 0 0 2px var(--brand) inset; }
    50%{ box-shadow:0 0 0 2px var(--brand) inset, 0 0 0 5px var(--brand-tint); }
  }

  .grid{ animation:none; }
  .grid.slide-left .day{ animation:slideInLeft .32s ease backwards; }
  .grid.slide-right .day{ animation:slideInRight .32s ease backwards; }
  @keyframes slideInLeft{
    from{ opacity:0; transform:translateX(16px); }
    to{ opacity:1; transform:translateX(0); }
  }
  @keyframes slideInRight{
    from{ opacity:0; transform:translateX(-16px); }
    to{ opacity:1; transform:translateX(0); }
  }
  .grid .day{ animation-delay:calc(var(--i, 0) * 8ms); }

  .stat .value{ transition:transform .15s ease; }
  .stat.bump .value{ transform:scale(1.12); }

  #status{
    padding:8px 18px;
    font-size:0.78rem;
    color:#a29c8c;
    min-height:1.2em;
  }
  #status.err{color:var(--bad);}
  .hidden{display:none !important;}

  #appFooter{
    text-align:center;
    font-size:0.72rem;
    color:#a29c8c;
    padding:20px 18px calc(10px + env(safe-area-inset-bottom));
  }

  .day{position:relative;}
  .day.hasInfo::after{
    content:"";
    position:absolute;
    top:4px; right:4px;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--ink);
    opacity:0.5;
  }
  .day.hasInfo.holiday::after, .day.hasInfo.A::after{ background:#fff; opacity:0.85; }

  #dayInfoOverlay{
    position:fixed; inset:0;
    background:rgba(28,36,48,0.4);
    z-index:20;
  }
  #dayInfoCard{
    position:fixed;
    left:0; right:0; bottom:0;
    max-width:480px;
    margin:0 auto;
    background:#fff;
    border-radius:16px 16px 0 0;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    z-index:21;
    box-shadow:0 -4px 20px rgba(0,0,0,0.15);
  }
  .dayInfoDate{font-weight:700;font-size:1.05rem;margin-bottom:10px;}
  .dayInfoLine{font-size:0.9rem;color:#3a3630;padding:6px 0;border-top:1px solid var(--line);}
  .dayInfoLine:first-of-type{border-top:none;}
  .dayInfoLine strong{color:var(--ink);}
  #dayInfoClose{margin-top:14px;}

  #notasSection{
    padding:18px;
    border-top:1px solid var(--line);
    margin-top:6px;
  }
  .notasSub{font-size:0.78rem;color:#6b6558;margin-top:2px;margin-bottom:14px;}

  .notaCard{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    margin-bottom:8px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .notaCard .txt{flex:1;min-width:0;}
  .notaCard .desc{font-weight:600;font-size:0.9rem;}
  .notaCard .det{font-size:0.8rem;color:#6b6558;margin-top:2px;}
  .notaCard .actions{display:flex;gap:6px;flex-shrink:0;}
  .notaCard .actions button{
    background:transparent;border:none;font-size:1rem;
    padding:4px 6px;cursor:pointer;color:#a29c8c;
    display:inline-flex;align-items:center;justify-content:center;
    min-height:auto;
  }
  .notaCard .actions button:hover{color:var(--ink);}
  .notaLocked{opacity:0.5;padding:4px 6px;display:inline-flex;align-items:center;color:#a29c8c;}
  .notaEmpty{font-size:0.85rem;color:#a29c8c;padding:6px 0 14px;}

  #notaForm{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:10px;
  }
  #notaForm input{
    font-family:inherit;
    font-size:16px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
  }
  #notaForm input:focus{outline:2px solid var(--ink);outline-offset:1px;}
  #notaFormBtns{display:flex;gap:8px;}
  #notaFormBtns button{flex:1;}
  .notaRow2{display:flex;gap:8px;}
  .notaRow2 input{flex:1;min-width:0;}
  #notaForm input[type="date"]{color:var(--ink);}

  #exportSection{padding:6px 18px 24px;}
</style>
</head>

   ============================================================ */
const APP_VERSION = 'v2.1.1';

const ICON_EDIT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
const ICON_TRASH = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
const ICON_LOCK = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';
const CLIENT_ID = '108256538530-fgunbb52s7f3s9aurfpjtaf01v8fjbph.apps.googleusercontent.com';

let currentYear = new Date().getFullYear();

const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

let tokenClient;
let accessToken = null;

let rowIndex = {};      // { 'YYYY-MM-DD': rowNumber } (1-indexed sheet row)

const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function setStatus(msg, isErr=false){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
}

function pad(n){ return n.toString().padStart(2,'0'); }
function isoDate(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

/* ---------- Auth (Google Identity Services) ---------- */
window.onload = () => {
  document.title = `KLx RTO ${currentYear}`;
  document.getElementById('footerVersion').textContent = APP_VERSION;
  console.log('KLx RTO app', APP_VERSION);

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error){ setStatus('Falha no login: ' + resp.error, true); return; }
      accessToken = resp.access_token;
      onSignedIn();
    }
  });
  document.getElementById('signinBtn').onclick = () => tokenClient.requestAccessToken();
  document.getElementById('setupBtn').onclick = initializeSheet;
  document.getElementById('prevMonth').onclick = () => changeMonth(-1);
  document.getElementById('nextMonth').onclick = () => changeMonth(1);
  document.getElementById('todayBtn').onclick = () => goToToday();
  document.getElementById('dayInfoClose').onclick = () => hideDayInfo();
  document.getElementById('dayInfoOverlay').onclick = () => hideDayInfo();
  document.getElementById('notaSaveBtn').onclick = onNotaSave;
  document.getElementById('notaCancelBtn').onclick = cancelNotaEdit;
  document.getElementById('tabBtnCal').onclick = () => showTab('cal');
  document.getElementById('tabBtnNotas').onclick = () => showTab('notas');
  document.getElementById('feriasModeToggle').onchange = (e) => {
    feriasMode = e.target.checked;
    renderMonth();
  };
};

let currentTab = 'cal';

function showTab(tab){
  currentTab = tab;
  document.getElementById('tabCalendario').classList.toggle('hidden', tab !== 'cal');
  document.getElementById('tabNotas').classList.toggle('hidden', tab !== 'notas');
  document.getElementById('tabBtnCal').classList.toggle('active', tab === 'cal');
  document.getElementById('tabBtnNotas').classList.toggle('active', tab === 'notas');
}

async function onSignedIn(){
  document.getElementById('authArea').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await loadData();
  await loadNotes();
}

/* ---------- Sheets API helpers ---------- */
async function sheetsGet(range){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}`;
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (!res.ok) throw new Error('Erro a ler a folha (' + res.status + ')');
  return res.json();
}

async function sheetsPut(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ range, values })
  });
  if (!res.ok) throw new Error('Erro a gravar (' + res.status + ')');
  return res.json();
}

async function sheetsAppend(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ range, values })
  });
  if (!res.ok) throw new Error('Erro a inicializar (' + res.status + ')');
  return res.json();
}

/* ---------- Load + parse data ---------- */
async function loadData(){
  setStatus('A carregar dados…');
  try{
    const data = await sheetsGet(`${SHEET_NAME}!A2:B4000`);
    const rows = data.values || [];
    dayData = {};
    rowIndex = {};
    if (rows.length === 0){
      document.getElementById('setupBtn').classList.remove('hidden');
      setStatus('A folha parece vazia. Usa "Inicializar folha" (só é preciso uma vez).');
      renderMonth();
      updateTotals();
      return;
    }
    document.getElementById('setupBtn').classList.add('hidden');
    rows.forEach((row, i) => {
      const dateStr = row[0];
      const mark = row[1] || '';
      if (dateStr){
        dayData[dateStr] = mark;
        rowIndex[dateStr] = i + 2; // +2: header row + 0-index offset
      }
    });
    setStatus('');
    renderMonth();
    updateTotals();
  }catch(err){
    setStatus(err.message, true);
  }
}

/* ---------- Setup (first run): writes header + 365/366 date rows for currentYear ---------- */
async function initializeSheet(){
  setStatus('A inicializar a folha…');
  try{
    const values = [['Data','Marca']];
    let d = new Date(currentYear,0,1);
    while (d.getFullYear() === currentYear){
      values.push([isoDate(d.getFullYear(), d.getMonth(), d.getDate()), '']);
      d.setDate(d.getDate()+1);
    }
    await sheetsPut(`${SHEET_NAME}!A1`, values);
    setStatus('Folha inicializada.');
    await loadData();
  }catch(err){
    setStatus(err.message, true);
  }
}

/* ---------- Inicializar um ano seguinte (2027, 2028...) na mesma folha ---------- */
async function initializeYear(year){
  setStatus(`A inicializar ${year}…`);
  try{
    const values = [];
    let d = new Date(year,0,1);
    while (d.getFullYear() === year){
      values.push([isoDate(d.getFullYear(), d.getMonth(), d.getDate()), '']);
      d.setDate(d.getDate()+1);
    }
    await sheetsAppend(`${SHEET_NAME}!A:B`, values);
    setStatus(`${year} inicializado.`);
    await loadData();
  }catch(err){
    setStatus(err.message, true);
  }
}

function checkYearInitialized(){
  const banner = document.getElementById('yearBanner');
  const jan1 = isoDate(currentYear, 0, 1);
  if (!(jan1 in rowIndex)){
    banner.classList.remove('hidden');
    banner.innerHTML = `<span>${currentYear} ainda não está na folha.</span><button id="initYearBtn" class="btn-secondary">Inicializar ${currentYear}</button>`;
    document.getElementById('initYearBtn').onclick = () => initializeYear(currentYear);
  } else {
    banner.classList.add('hidden');
    banner.innerHTML = '';
  }
}

/* ---------- Calendar rendering ---------- */
/* ---------- Feriados nacionais PT + municipal de Lisboa ---------- */
let holidayNames = new Map(); // 'YYYY-MM-DD' -> nome do feriado
let holidayYearCached = null;

function computeEaster(year){
  const a = year % 19, b = Math.floor(year/100), c = year % 100;
  const d = Math.floor(b/4), e = b % 4;
  const f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3);
  const h = (19*a+b-d-g+15)%30;
  const i = Math.floor(c/4), k = c%4;
  const l = (32+2*e+2*i-h-k)%7;
  const m = Math.floor((a+11*h+22*l)/451);
  const month = Math.floor((h+l-7*m+114)/31);
  const day = ((h+l-7*m+114)%31)+1;
  return new Date(year, month-1, day);
}

function computeHolidays(year){
  const easter = computeEaster(year);
  const goodFriday = new Date(easter); goodFriday.setDate(easter.getDate()-2);
  const corpusChristi = new Date(easter); corpusChristi.setDate(easter.getDate()+60);
  const fixed = [
    [0,1,'Ano Novo'], [3,25,'Dia da Liberdade'], [4,1,'Dia do Trabalhador'],
    [5,10,'Dia de Portugal'], [5,13,'Santo António (Lisboa)'],
    [7,15,'Assunção de Nossa Senhora'], [9,5,'Implantação da República'],
    [10,1,'Todos os Santos'], [11,1,'Restauração da Independência'],
    [11,8,'Imaculada Conceição'], [11,25,'Natal'],
  ];
  const map = new Map();
  fixed.forEach(([m,d,name]) => map.set(isoDate(year,m,d), name));
  map.set(isoDate(goodFriday.getFullYear(), goodFriday.getMonth(), goodFriday.getDate()), 'Sexta-feira Santa');
  map.set(isoDate(corpusChristi.getFullYear(), corpusChristi.getMonth(), corpusChristi.getDate()), 'Corpo de Deus');
  return map;
}

function ensureHolidays(year){
  if (holidayYearCached !== year){
    holidayNames = computeHolidays(year);
    holidayYearCached = year;
  }
}

/* ---------- Composição visual de uma célula (reutilizada no render e nos toques) ---------- */
function computeCellDisplay(dateStr){
  const mark = dayData[dateStr] || '';
  const isHoliday = holidayNames.has(dateStr);
  const noteLetter = !mark ? (noteMarks[dateStr] || '') : '';
  let markHTML = '', cls = '';
  if (mark){
    markHTML = mark; cls = mark;
  } else if (isHoliday && noteLetter === 'A'){
    markHTML = `A<span class="hf">f</span>`; cls = 'A';
  } else if (isHoliday){
    markHTML = 'f'; cls = 'holiday';
  } else if (noteLetter){
    markHTML = noteLetter; cls = noteLetter;
  }
  return { markHTML, cls };
}

/* ---------- Notas/feriados que cobrem uma data (para a etiqueta de info) ---------- */
function getDayInfoLines(dateStr){
  const lines = [];
  if (holidayNames.has(dateStr)){
    lines.push({ label: 'Feriado', text: holidayNames.get(dateStr) });
  }
  const d = parsePtDate(toPtDate(dateStr));
  notasData.forEach(n => {
    const s = parsePtDate(n.dataInicio) || parsePtDate(n.dataFim);
    const e = parsePtDate(n.dataFim) || s;
    if (s && e && d >= s && d <= e){
      lines.push({ label: n.categoria || 'Nota', text: n.descricao || '' });
    }
  });
  return lines;
}

function dayHasInfo(dateStr){
  if (holidayNames.has(dateStr)) return true;
  const d = parsePtDate(toPtDate(dateStr));
  return notasData.some(n => {
    const s = parsePtDate(n.dataInicio) || parsePtDate(n.dataFim);
    const e = parsePtDate(n.dataFim) || s;
    return s && e && d >= s && d <= e;
  });
}

function renderMonth(){
  document.getElementById('monthLabel').textContent = `${MESES[currentMonth]} ${currentYear}`;
  checkYearInitialized();
  ensureHolidays(currentYear);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.classList.remove('slide-left', 'slide-right');
  if (slideDirection){
    grid.classList.add(slideDirection === 1 ? 'slide-left' : 'slide-right');
    slideDirection = 0;
  }

  const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Dom
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayStr = isoDate(today.getFullYear(), today.getMonth(), today.getDate());
  let cellIndex = 0;

  for (let i=0; i<firstDay; i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
    cellIndex++;
  }

  for (let d=1; d<=daysInMonth; d++){
    const dateStr = isoDate(currentYear, currentMonth, d);
    const cell = document.createElement('div');
    const cellDate = new Date(currentYear, currentMonth, d);
    const dow = cellDate.getDay();
    const isWeekend = (dow===0||dow===6);
    const diffDays = Math.round((cellDate - today) / 86400000);
    const isPastDay = diffDays < 0;
    const tooFarInPast = diffDays < -7;
    const blocked = isWeekend || (feriasMode ? isPastDay : tooFarInPast);
    const { markHTML, cls } = computeCellDisplay(dateStr);
    const hasInfo = dayHasInfo(dateStr);
    cell.className = 'day' + (cls ? ' '+cls : '') + (isWeekend ? ' weekend' : '')
      + (dateStr===todayStr ? ' today' : '') + (blocked && !isWeekend ? ' locked' : '')
      + (hasInfo ? ' hasInfo' : '');
    cell.style.setProperty('--i', cellIndex % 7);
    cell.innerHTML = `<div class="num">${d}</div><div class="mark">${markHTML}</div>`;
    if (!blocked){
      cell.onclick = feriasMode ? (() => onDayTap(dateStr, cell, toggleFeriasDay)) : (() => onDayTap(dateStr, cell, cycleDay));
    }
    attachLongPress(cell, dateStr);
    grid.appendChild(cell);
    cellIndex++;
  }
}

let slideDirection = 0; // 1 = mês seguinte (desliza da direita), -1 = mês anterior (desliza da esquerda)

function changeMonth(delta){
  let m = currentMonth + delta;
  if (m < 0){ m = 11; currentYear--; }
  else if (m > 11){ m = 0; currentYear++; }
  currentMonth = m;
  slideDirection = delta > 0 ? 1 : -1;
  renderMonth();
  updateTotals();
  renderNotes();
}

function goToToday(){
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderMonth();
  updateTotals();
  renderNotes();
}

/* ---------- Toque longo -> etiqueta com feriados/astreinte/notas do dia ---------- */
let suppressNextTap = false;

function onDayTap(dateStr, cell, handler){
  if (suppressNextTap){ suppressNextTap = false; return; }
  handler(dateStr, cell);
}

function attachLongPress(cell, dateStr){
  let timer = null;
  let startX = 0, startY = 0;
  const LONG_PRESS_MS = 550;
  const MOVE_TOLERANCE = 10;

  const clear = () => { if (timer){ clearTimeout(timer); timer = null; } };

  cell.addEventListener('pointerdown', (e) => {
    startX = e.clientX; startY = e.clientY;
    clear();
    timer = setTimeout(() => {
      timer = null;
      suppressNextTap = true;
      showDayInfo(dateStr);
    }, LONG_PRESS_MS);
  });
  cell.addEventListener('pointermove', (e) => {
    if (timer && (Math.abs(e.clientX-startX) > MOVE_TOLERANCE || Math.abs(e.clientY-startY) > MOVE_TOLERANCE)){
      clear();
    }
  });
  cell.addEventListener('pointerup', clear);
  cell.addEventListener('pointercancel', clear);
  cell.addEventListener('pointerleave', clear);
}

function showDayInfo(dateStr){
  const lines = getDayInfoLines(dateStr);
  if (lines.length === 0) return;
  const [y,m,dd] = dateStr.split('-');
  const html = [`<div class="dayInfoDate">${dd}/${m}/${y}</div>`]
    .concat(lines.map(l => `<div class="dayInfoLine"><strong>${l.label}</strong>${l.text ? ' — '+l.text : ''}</div>`))
    .join('');
  document.getElementById('dayInfoContent').innerHTML = html;
  document.getElementById('dayInfoOverlay').classList.remove('hidden');
  document.getElementById('dayInfoCard').classList.remove('hidden');
}

function hideDayInfo(){
  document.getElementById('dayInfoOverlay').classList.add('hidden');
  document.getElementById('dayInfoCard').classList.add('hidden');
}

/* ---------- Tap to cycle: '' -> T -> C -> '' (dias úteis apenas) ---------- */
async function cycleDay(dateStr, cell){
  const current = dayData[dateStr] || '';
  const next = current === '' ? 'T' : current === 'T' ? 'C' : '';

  dayData[dateStr] = next;
  const todayStr = isoDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  const { markHTML, cls } = computeCellDisplay(dateStr);
  const hasInfo = dayHasInfo(dateStr);
  const extra = [cls, dateStr===todayStr ? 'today' : '', hasInfo ? 'hasInfo' : ''].filter(Boolean).join(' ');
  cell.className = 'day ' + extra;
  const dayNum = parseInt(dateStr.slice(-2), 10);
  cell.innerHTML = `<div class="num">${dayNum}</div><div class="mark">${markHTML}</div>`;
  updateTotals();

  const row = rowIndex[dateStr];
  if (!row){ setStatus('Data não encontrada na folha — usa "Inicializar folha".', true); return; }

  setStatus('A gravar…');
  try{
    await sheetsPut(`${SHEET_NAME}!B${row}`, [[next]]);
    setStatus('');
  }catch(err){
    setStatus('Não gravou: ' + err.message, true);
  }
}

/* ---------- Modo Férias: tocar num dia marca/desmarca um dia de férias (não mexe em T/C) ---------- */
function ptAddDays(pt, delta){
  const d = parsePtDate(pt);
  if (!d) return pt;
  d.setDate(d.getDate() + delta);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function prevBusinessDayPt(pt){
  let d = parsePtDate(pt);
  d.setDate(d.getDate() - 1);
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function nextBusinessDayPt(pt){
  let d = parsePtDate(pt);
  d.setDate(d.getDate() + 1);
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}
function notaRange(row){ return `${NOTAS_SHEET}!A${row}:D${row}`; }

async function toggleFeriasDay(dateStr, cell){
  const pt = toPtDate(dateStr);
  const d = parsePtDate(pt);

  setStatus('A atualizar férias…');
  try{
    const covering = notasData.find(n => {
      if (!normalizeCategoria(n.categoria).includes('feria')) return false;
      const s = parsePtDate(n.dataInicio) || parsePtDate(n.dataFim);
      const e = parsePtDate(n.dataFim) || s;
      return s && e && d >= s && d <= e;
    });

    if (covering){
      /* -------- remover este dia de uma nota existente (encolher / dividir / apagar) -------- */
      const origStart = covering.dataInicio, origEnd = covering.dataFim;
      const s = parsePtDate(origStart), e = parsePtDate(origEnd);

      if (+s === +d && +e === +d){
        await sheetsPut(notaRange(covering.row), [['','','','']]);
        notasData = notasData.filter(x => x.row !== covering.row);
      } else if (+d === +s){
        const newStart = ptAddDays(origStart, 1);
        await sheetsPut(notaRange(covering.row), [[newStart, origEnd, covering.categoria, covering.descricao]]);
        covering.dataInicio = newStart;
      } else if (+d === +e){
        const newEnd = ptAddDays(origEnd, -1);
        await sheetsPut(notaRange(covering.row), [[origStart, newEnd, covering.categoria, covering.descricao]]);
        covering.dataFim = newEnd;
      } else {
        const leftEnd = ptAddDays(pt, -1);
        const rightStart = ptAddDays(pt, 1);
        await sheetsPut(notaRange(covering.row), [[origStart, leftEnd, covering.categoria, covering.descricao]]);
        covering.dataFim = leftEnd;
        const newRow = notasNextRow++;
        await sheetsPut(notaRange(newRow), [[rightStart, origEnd, covering.categoria, covering.descricao]]);
        notasData.push({ row:newRow, dataInicio:rightStart, dataFim:origEnd, categoria:covering.categoria, descricao:covering.descricao });
      }
    } else {
      /* -------- adicionar este dia, juntando a notas de Férias adjacentes se existirem -------- */
      const prevDay = prevBusinessDayPt(pt);
      const nextDay = nextBusinessDayPt(pt);
      const prevNote = notasData.find(n => normalizeCategoria(n.categoria).includes('feria') && n.dataFim === prevDay);
      const nextNote = notasData.find(n => normalizeCategoria(n.categoria).includes('feria') && n.dataInicio === nextDay);

      if (prevNote && nextNote){
        const newEnd = nextNote.dataFim;
        const mergedCategoria = prevNote.categoria || nextNote.categoria;
        const mergedDescricao = [prevNote.descricao, nextNote.descricao]
          .map(s => (s||'').trim()).filter(Boolean)
          .filter((v,i,a) => a.indexOf(v) === i)
          .join(' / ');
        await sheetsPut(notaRange(prevNote.row), [[prevNote.dataInicio, newEnd, mergedCategoria, mergedDescricao]]);
        await sheetsPut(notaRange(nextNote.row), [['','','','']]);
        prevNote.dataFim = newEnd;
        prevNote.categoria = mergedCategoria;
        prevNote.descricao = mergedDescricao;
        notasData = notasData.filter(x => x.row !== nextNote.row);
      } else if (prevNote){
        await sheetsPut(notaRange(prevNote.row), [[prevNote.dataInicio, pt, prevNote.categoria, prevNote.descricao]]);
        prevNote.dataFim = pt;
      } else if (nextNote){
        await sheetsPut(notaRange(nextNote.row), [[pt, nextNote.dataFim, nextNote.categoria, nextNote.descricao]]);
        nextNote.dataInicio = pt;
      } else {
        const row = notasNextRow++;
        await sheetsPut(notaRange(row), [[pt, pt, 'Férias', '']]);
        notasData.push({ row, dataInicio: pt, dataFim: pt, categoria: 'Férias', descricao: '' });
      }

      // um dia de férias deixa de ser um dia de trabalho
      if (rowIndex[dateStr] && dayData[dateStr]){
        await sheetsPut(`${SHEET_NAME}!B${rowIndex[dateStr]}`, [['']]);
        dayData[dateStr] = '';
      }
    }
    sortNotas();
    computeNoteMarks();
    renderNotes();
    renderMonth();
    updateTotals();
    setStatus('');
  }catch(err){
    setStatus('Não gravou: ' + err.message, true);
  }
}

/* ---------- Totals + pro-rata (relativo ao ano visível no calendário) ---------- */
/* ---------- Anima a transição de um valor numérico nos cartões de estatística ---------- */
function animateValue(elId, newVal){
  const el = document.getElementById(elId);
  const prev = parseFloat(el.textContent);
  const isFirstLoad = isNaN(prev);
  const from = isFirstLoad ? 0 : prev;
  if (from === newVal){ el.textContent = newVal; return; }
  const decimals = (String(newVal).split('.')[1] || '').length;
  const duration = isFirstLoad ? 700 : 400;
  const start = performance.now();
  const box = el.closest('.stat');
  if (box && !isFirstLoad) box.classList.add('bump');
  function step(now){
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const current = from + (newVal - from) * eased;
    el.textContent = decimals ? current.toFixed(decimals) : Math.round(current);
    if (t < 1){
      requestAnimationFrame(step);
    } else {
      el.textContent = newVal;
      if (box) box.classList.remove('bump');
    }
  }
  requestAnimationFrame(step);
}

function updateTotals(){
  let countT = 0, countC = 0;
  let countC_cond = 0;
  Object.keys(dayData).forEach(date => {
    if (parseInt(date.slice(0,4), 10) !== currentYear) return;
    if (feriasDatesSet.has(date)) return; // dias de férias nunca contam para T/C
    const v = dayData[date];
    if (v === 'T') countT++; else if (v === 'C') countC++;

    // versão condicional: durante RTO suspensão, dias em casa não contam
    if (rtoSuspensaoDatesSet.has(date)) return;
    if (v === 'C') countC_cond++;
  });

  // Astreinte: cada dia com astreinte vale menos um dia em casa (crédito), independente do que estiver marcado nesse dia
  astreinteDatesSet.forEach(date => {
    if (parseInt(date.slice(0,4), 10) !== currentYear) return;
    if (rtoSuspensaoDatesSet.has(date)) return; // já excluído acima, evita dupla contagem
    countC_cond -= 1;
  });

  const now = new Date();
  const startYear = new Date(currentYear,0,1);
  const endYear = new Date(currentYear,11,31);
  const daysInYear = Math.round((endYear - startYear) / 86400000) + 1;
  let elapsedDays;
  if (now < startYear) elapsedDays = 0;
  else if (now > endYear) elapsedDays = daysInYear;
  else elapsedDays = Math.floor((now - startYear)/86400000) + 1;
  const quotaProRata = Math.round((QUOTA_ANUAL * elapsedDays / daysInYear) * 10) / 10;
  const saldo = Math.round((quotaProRata - countC) * 10) / 10;
  const saldoCond = Math.round((quotaProRata - countC_cond) * 10) / 10;

  animateValue('statT', countT);
  animateValue('statC', countC);
  animateValue('statQuota', quotaProRata);

  const pct = Math.round((countC / QUOTA_ANUAL) * 100);
  document.getElementById('statCPct').textContent = `${pct}% da quota anual`;
  const cBox = document.getElementById('statCBox');
  cBox.className = 'stat c ' + (countC >= QUOTA_ANUAL ? 'over' : countC >= QUOTA_ANUAL*0.7 ? 'warn' : '');

  function saldoTier(v){ return v < 0 ? 'saldo-bad' : v <= 10 ? 'saldo-warn' : 'saldo-ok'; }

  animateValue('statSaldo', saldo);
  document.getElementById('statSaldoBox').className = 'stat ' + saldoTier(saldo);

  animateValue('statSaldoCond', saldoCond);
  document.getElementById('statSaldoCondBox').className = 'stat ' + saldoTier(saldoCond);
}

/* ---------- Notas (4 campos: Data Início | Data Fim | Categoria | Descrição) ---------- */
const NOTAS_SHEET = 'Notas';
let notasData = [];      // [{ row, dataInicio, dataFim, categoria, descricao }]
let notasNextRow = 2;
let editingRow = null;   // row currently being edited, or null when adding new
let noteMarks = {};      // { 'YYYY-MM-DD': 'F' | 'A' }, derived from Notas categories

function toISODateForInput(v){
  // Accepts 'dd/mm/yyyy' or ISO strings or Sheets serial-like text; returns yyyy-mm-dd or ''
  if (!v) return '';
  const m = v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2]}-${m[1]}`;
  if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  return '';
}
function toPtDate(iso){
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function parsePtDate(v){
  const m = (v||'').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3],10), parseInt(m[2],10)-1, parseInt(m[1],10));
}
function normalizeCategoria(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
let feriasDatesSet = new Set();
let astreinteDatesSet = new Set();
let rtoSuspensaoDatesSet = new Set();

function computeNoteMarks(){
  noteMarks = {};
  feriasDatesSet = new Set();
  astreinteDatesSet = new Set();
  rtoSuspensaoDatesSet = new Set();
  notasData.forEach(n => {
    const cat = normalizeCategoria(n.categoria);
    let letter = null;
    const isSuspensao = cat.includes('suspens');
    if (cat.includes('feria')) letter = 'F';
    else if (cat.includes('astr')) letter = 'A'; // cobre "astreinte" e "astrainte"
    if (!letter && !isSuspensao) return;
    const start = parsePtDate(n.dataInicio) || parsePtDate(n.dataFim);
    if (!start) return;
    const end = parsePtDate(n.dataFim) || start;
    const d = new Date(start);
    while (d <= end){
      const iso = isoDate(d.getFullYear(), d.getMonth(), d.getDate());
      const isWeekendDay = (d.getDay() === 0 || d.getDay() === 6);
      if (isSuspensao){
        rtoSuspensaoDatesSet.add(iso);
      } else if (letter === 'F'){
        feriasDatesSet.add(iso); // conta como férias mesmo ao fim de semana, para nunca entrar nos cálculos
        if (!isWeekendDay) noteMarks[iso] = letter;
      } else if (letter === 'A'){
        astreinteDatesSet.add(iso);
        noteMarks[iso] = letter; // astreinte aparece mesmo ao fim de semana
      }
      d.setDate(d.getDate() + 1);
    }
  });
}

function sortNotas(){
  notasData.sort((a, b) => {
    const da = parsePtDate(a.dataInicio) || parsePtDate(a.dataFim);
    const db = parsePtDate(b.dataInicio) || parsePtDate(b.dataFim);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });
}

async function loadNotes(){
  try{
    const data = await sheetsGet(`${NOTAS_SHEET}!A2:D1000`);
    const rows = data.values || [];
    notasData = [];
    rows.forEach((row, i) => {
      const dataInicio = row[0] || '';
      const dataFim = row[1] || '';
      const categoria = row[2] || '';
      const descricao = row[3] || '';
      if (dataInicio || dataFim || categoria || descricao){
        notasData.push({ row: i + 2, dataInicio, dataFim, categoria, descricao });
      }
    });
    notasNextRow = rows.length + 2;
    sortNotas();
    computeNoteMarks();
    renderNotes();
    renderMonth();
    updateTotals();
  }catch(err){
    document.getElementById('notasList').innerHTML =
      `<div class="notaEmpty">Não foi possível carregar as notas (${err.message}). Confirma que existe uma aba "Notas" com as colunas Data Início, Data Fim, Categoria, Descrição.</div>`;
  }
}

function noteMatchesYear(n, year){
  const s = parsePtDate(n.dataInicio);
  const e = parsePtDate(n.dataFim);
  if (s && s.getFullYear() === year) return true;
  if (e && e.getFullYear() === year) return true;
  if (s && e && s.getFullYear() < year && e.getFullYear() > year) return true; // intervalo que atravessa o ano todo
  return false;
}

function renderNotes(){
  const list = document.getElementById('notasList');
  const visibleNotas = notasData.filter(n => noteMatchesYear(n, currentYear));
  if (visibleNotas.length === 0){
    list.innerHTML = `<div class="notaEmpty">Sem notas em ${currentYear}.</div>`;
    positionNotaForm();
    return;
  }
  list.innerHTML = '';
  visibleNotas.forEach(n => {
    const card = document.createElement('div');
    card.className = 'notaCard';
    card.dataset.row = n.row;
    const locked = isPastFeriasNote(n);
    const periodo = n.dataInicio && n.dataFim && n.dataInicio !== n.dataFim
      ? `${n.dataInicio} a ${n.dataFim}` : (n.dataInicio || n.dataFim || '');
    card.innerHTML = `
      <div class="txt">
        <div class="desc"></div>
        <div class="det"></div>
      </div>
      <div class="actions">
        ${locked ? `<span class="notaLocked" title="Já terminou — não editável">${ICON_LOCK}</span>` : `
        <button title="Editar">${ICON_EDIT}</button>
        <button title="Eliminar">${ICON_TRASH}</button>`}
      </div>`;
    card.querySelector('.desc').textContent = n.categoria || n.descricao || '(sem categoria)';
    card.querySelector('.det').textContent = [periodo, n.categoria && n.descricao ? n.descricao : ''].filter(Boolean).join(' — ');
    if (!locked){
      const [editBtn, delBtn] = card.querySelectorAll('.actions button');
      editBtn.onclick = () => startNotaEdit(n);
      delBtn.onclick = () => deleteNota(n);
    }
    list.appendChild(card);
  });
  positionNotaForm();
}

function positionNotaForm(){
  const formEl = document.getElementById('notaForm');
  if (editingRow){
    const card = document.querySelector(`.notaCard[data-row="${editingRow}"]`);
    if (card){ card.insertAdjacentElement('afterend', formEl); return; }
  }
  document.getElementById('notasList').insertAdjacentElement('afterend', formEl);
}

function isDateBeforeToday(pt){
  const d = parsePtDate(pt);
  if (!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

function isPastFeriasNote(n){
  const cat = normalizeCategoria(n.categoria);
  if (!(cat.includes('feria') || cat.includes('astr'))) return false;
  const endPt = n.dataFim || n.dataInicio;
  return isDateBeforeToday(endPt);
}

function startNotaEdit(n){
  if (isPastFeriasNote(n)){
    setStatus('Não é possível editar férias/astreinte que já terminaram.', true);
    return;
  }
  editingRow = n.row;
  document.getElementById('notaDataInicio').value = toISODateForInput(n.dataInicio);
  document.getElementById('notaDataFim').value = toISODateForInput(n.dataFim);
  document.getElementById('notaCategoria').value = n.categoria;
  document.getElementById('notaDescricao').value = n.descricao;
  document.getElementById('notaSaveBtn').textContent = 'Guardar alterações';
  document.getElementById('notaCancelBtn').classList.remove('hidden');
  positionNotaForm();
  document.getElementById('notaForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function cancelNotaEdit(){
  editingRow = null;
  document.getElementById('notaDataInicio').value = '';
  document.getElementById('notaDataFim').value = '';
  document.getElementById('notaCategoria').value = '';
  document.getElementById('notaDescricao').value = '';
  document.getElementById('notaSaveBtn').textContent = 'Adicionar nota';
  document.getElementById('notaCancelBtn').classList.add('hidden');
  positionNotaForm();
}

async function onNotaSave(){
  const dataInicio = toPtDate(document.getElementById('notaDataInicio').value);
  const dataFim = toPtDate(document.getElementById('notaDataFim').value);
  const categoria = document.getElementById('notaCategoria').value.trim();
  const descricao = document.getElementById('notaDescricao').value.trim();
  if (!dataInicio && !dataFim && !categoria && !descricao) return;

  const catNorm = normalizeCategoria(categoria);
  if ((catNorm.includes('feria') || catNorm.includes('astr')) && isDateBeforeToday(dataFim || dataInicio)){
    setStatus('Não é possível registar/alterar férias ou astreinte numa data já passada.', true);
    return;
  }

  const values = [[dataInicio, dataFim, categoria, descricao]];
  setStatus('A gravar nota…');
  try{
    if (editingRow){
      await sheetsPut(`${NOTAS_SHEET}!A${editingRow}:D${editingRow}`, values);
      const idx = notasData.findIndex(n => n.row === editingRow);
      if (idx > -1) notasData[idx] = { row: editingRow, dataInicio, dataFim, categoria, descricao };
    } else {
      const row = notasNextRow;
      await sheetsPut(`${NOTAS_SHEET}!A${row}:D${row}`, values);
      notasData.push({ row, dataInicio, dataFim, categoria, descricao });
      notasNextRow++;
    }
    cancelNotaEdit();
    sortNotas();
    computeNoteMarks();
    renderNotes();
    renderMonth();
    setStatus('');
  }catch(err){
    setStatus('Não gravou a nota: ' + err.message, true);
  }
}

async function deleteNota(n){
  if (isPastFeriasNote(n)){
    setStatus('Não é possível eliminar férias/astreinte que já terminaram.', true);
    return;
  }
  if (!confirm(`Eliminar a nota "${n.categoria || n.descricao}"?`)) return;
  setStatus('A eliminar…');
  try{
    await sheetsPut(`${NOTAS_SHEET}!A${n.row}:D${n.row}`, [['','','','']]);
    notasData = notasData.filter(x => x.row !== n.row);
    if (editingRow === n.row) cancelNotaEdit();
    computeNoteMarks();
    renderNotes();
    renderMonth();
    setStatus('');
  }catch(err){
    setStatus('Não eliminou: ' + err.message, true);
  }
}

/* ---------- Exportar tudo para .xlsx ---------- */
function exportToExcel(){
  const wb = XLSX.utils.book_new();

  // Dados
  const dadosRows = [['Data','Marca']];
  Object.keys(dayData).sort().forEach(date => {
    dadosRows.push([date, dayData[date] || '']);
  });
  const wsDados = XLSX.utils.aoa_to_sheet(dadosRows);
  XLSX.utils.book_append_sheet(wb, wsDados, 'Dados');

  // Notas
  const notasRows = [['Data Início','Data Fim','Categoria','Descrição']];
  notasData.forEach(n => notasRows.push([n.dataInicio, n.dataFim, n.categoria, n.descricao]));
  const wsNotas = XLSX.utils.aoa_to_sheet(notasRows);
  XLSX.utils.book_append_sheet(wb, wsNotas, 'Notas');

  // Resumo
  const countT = document.getElementById('statT').textContent;
  const countC = document.getElementById('statC').textContent;
  const quota = document.getElementById('statQuota').textContent;
  const saldo = document.getElementById('statSaldo').textContent;
  const resumoRows = [
    ['Dias no escritório', countT],
    ['Dias em casa', countC],
    ['Quota anual homework', QUOTA_ANUAL],
    ['Quota pro-rata até hoje', quota],
    ['Saldo (quota - casa usados)', saldo],
  ];
  const wsResumo = XLSX.utils.aoa_to_sheet(resumoRows);
  XLSX.utils.book_append_sheet(wb, wsResumo, 'Resumo');

  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Escritorio_Casa_${today}.xlsx`);
}

document.getElementById('exportBtn').addEventListener('click', exportToExcel);
