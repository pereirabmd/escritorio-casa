<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Escritório / Casa 2026</title>
<style>
  :root{
    --ink:#1c2430;
    --paper:#f6f4ef;
    --line:#dcd7cc;
    --t-color:#2f6fed;
    --t-tint:#e3ecfe;
    --c-color:#e0762c;
    --c-tint:#fbe9d9;
    --ok:#2f8a52;
    --bad:#c94b3f;
    --accent:#1c2430;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding-bottom:60px;
  }
  header{
    padding:22px 18px 14px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:5;
  }
  h1{
    font-size:1.3rem;
    margin:0 0 2px;
    letter-spacing:-0.01em;
  }
  .sub{
    font-size:0.82rem;
    color:#6b6558;
  }
  #authArea{padding:18px;}
  button{
    font-family:inherit;
    border:none;
    border-radius:10px;
    padding:11px 18px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-primary:disabled{opacity:0.5;cursor:default;}

  #totals{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:14px 18px 4px;
  }
  .stat{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
  }
  .stat .label{font-size:0.72rem;color:#6b6558;text-transform:uppercase;letter-spacing:.04em;}
  .stat .value{font-size:1.35rem;font-weight:700;margin-top:2px;}
  .stat.t .value{color:var(--t-color);}
  .stat.c .value{color:var(--c-color);}
  .stat.saldo-ok .value{color:var(--ok);}
  .stat.saldo-bad .value{color:var(--bad);}

  #monthNav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px 6px;
  }
  #monthLabel{font-size:1.05rem;font-weight:700;}
  #monthNav button{
    background:#fff;border:1px solid var(--line);
    width:38px;height:38px;border-radius:50%;
    font-size:1.1rem;line-height:1;padding:0;
  }

  #legend{
    display:flex;gap:14px;
    padding:2px 18px 10px;
    font-size:0.78rem;color:#6b6558;
  }
  #legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
  .dot.t{background:var(--t-color);}
  .dot.c{background:var(--c-color);}

  #calendar{
    padding:0 18px 20px;
  }
  .weekhead{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-size:0.72rem;
    color:#a29c8c;
    margin-bottom:6px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .day{
    aspect-ratio:1;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:0.8rem;
    cursor:pointer;
    user-select:none;
    position:relative;
    transition:transform .08s ease;
  }
  .day:active{transform:scale(0.93);}
  .day.empty{visibility:hidden;cursor:default;}
  .day.weekend{background:#efece4;}
  .day .num{font-weight:600;}
  .day .mark{font-size:0.68rem;font-weight:700;letter-spacing:.03em;margin-top:1px;}
  .day.T{background:var(--t-tint);border-color:var(--t-color);color:var(--t-color);}
  .day.C{background:var(--c-tint);border-color:var(--c-color);color:var(--c-color);}
  .day.today{box-shadow:0 0 0 2px var(--ink) inset;}

  #status{
    padding:8px 18px;
    font-size:0.78rem;
    color:#a29c8c;
    min-height:1.2em;
  }
  #status.err{color:var(--bad);}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header>
  <h1>Escritório / Casa</h1>
  <div class="sub">2026 — dados na tua Google Sheet</div>
</header>

<div id="authArea">
  <button id="signinBtn" class="btn-primary">Iniciar sessão com a Google</button>
  <button id="setupBtn" class="btn-secondary hidden" style="margin-left:8px;">Inicializar folha (1ª vez)</button>
</div>

<div id="app" class="hidden">

  <div id="totals">
    <div class="stat t">
      <div class="label">Dias no escritório</div>
      <div class="value" id="statT">–</div>
    </div>
    <div class="stat c">
      <div class="label">Dias em casa</div>
      <div class="value" id="statC">–</div>
    </div>
    <div class="stat">
      <div class="label">Quota pro-rata (120/ano)</div>
      <div class="value" id="statQuota">–</div>
    </div>
    <div class="stat" id="statSaldoBox">
      <div class="label">Saldo</div>
      <div class="value" id="statSaldo">–</div>
    </div>
  </div>

  <div id="monthNav">
    <button id="prevMonth">‹</button>
    <div id="monthLabel">Janeiro</div>
    <button id="nextMonth">›</button>
  </div>

  <div id="legend">
    <span><span class="dot t"></span> T · Escritório</span>
    <span><span class="dot c"></span> C · Casa</span>
  </div>

  <div id="calendar">
    <div class="weekhead">
      <div>D</div><div>S</div><div>T</div><div>Q</div><div>Q</div><div>S</div><div>S</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

</div>

<div id="status"></div>

<script>
/* ============================================================
   CONFIGURAÇÃO — preenche estes 2 valores antes de usar
   ============================================================ */
const CLIENT_ID = '108256538530-fgunbb52s7f3s9aurfpjtaf01v8fjbph.apps.googleusercontent.com';
const SPREADSHEET_ID = '1ncHmV9XmgoG__mnx5kdMBeb39ZDBVnjaV5i-oJv5Uh8';
const SHEET_NAME = 'Dados';
const YEAR = 2026;
/* ============================================================ */

const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
const QUOTA_ANUAL = 120;

let tokenClient;
let accessToken = null;
let dayData = {};      // { 'YYYY-MM-DD': 'T' | 'C' | '' }
let rowIndex = {};      // { 'YYYY-MM-DD': rowNumber } (1-indexed sheet row)
let currentMonth = new Date().getMonth();
if (new Date().getFullYear() !== YEAR) currentMonth = 0;

const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function setStatus(msg, isErr=false){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
}

function pad(n){ return n.toString().padStart(2,'0'); }
function isoDate(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }

/* ---------- Auth (Google Identity Services) ---------- */
window.onload = () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error){ setStatus('Falha no login: ' + resp.error, true); return; }
      accessToken = resp.access_token;
      onSignedIn();
    }
  });
  document.getElementById('signinBtn').onclick = () => tokenClient.requestAccessToken();
  document.getElementById('setupBtn').onclick = initializeSheet;
  document.getElementById('prevMonth').onclick = () => changeMonth(-1);
  document.getElementById('nextMonth').onclick = () => changeMonth(1);
};

async function onSignedIn(){
  document.getElementById('authArea').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await loadData();
}

/* ---------- Sheets API helpers ---------- */
async function sheetsGet(range){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}`;
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (!res.ok) throw new Error('Erro a ler a folha (' + res.status + ')');
  return res.json();
}

async function sheetsPut(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ range, values })
  });
  if (!res.ok) throw new Error('Erro a gravar (' + res.status + ')');
  return res.json();
}

async function sheetsAppend(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      Authorization: 'Bearer ' + accessToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ range, values })
  });
  if (!res.ok) throw new Error('Erro a inicializar (' + res.status + ')');
  return res.json();
}

/* ---------- Load + parse data ---------- */
async function loadData(){
  setStatus('A carregar dados…');
  try{
    const data = await sheetsGet(`${SHEET_NAME}!A2:B366`);
    const rows = data.values || [];
    dayData = {};
    rowIndex = {};
    if (rows.length === 0){
      document.getElementById('setupBtn').classList.remove('hidden');
      setStatus('A folha parece vazia. Usa "Inicializar folha" (só é preciso uma vez).');
      renderMonth();
      updateTotals();
      return;
    }
    document.getElementById('setupBtn').classList.add('hidden');
    rows.forEach((row, i) => {
      const dateStr = row[0];
      const mark = row[1] || '';
      if (dateStr){
        dayData[dateStr] = mark;
        rowIndex[dateStr] = i + 2; // +2: header row + 0-index offset
      }
    });
    setStatus('');
    renderMonth();
    updateTotals();
  }catch(err){
    setStatus(err.message, true);
  }
}

/* ---------- Setup (first run): writes header + 365 date rows ---------- */
async function initializeSheet(){
  setStatus('A inicializar a folha…');
  try{
    const values = [['Data','Marca']];
    let d = new Date(YEAR,0,1);
    while (d.getFullYear() === YEAR){
      values.push([isoDate(d.getFullYear(), d.getMonth(), d.getDate()), '']);
      d.setDate(d.getDate()+1);
    }
    await sheetsPut(`${SHEET_NAME}!A1`, values);
    setStatus('Folha inicializada.');
    await loadData();
  }catch(err){
    setStatus(err.message, true);
  }
}

/* ---------- Calendar rendering ---------- */
function renderMonth(){
  document.getElementById('monthLabel').textContent = `${MESES[currentMonth]} ${YEAR}`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const firstDay = new Date(YEAR, currentMonth, 1).getDay(); // 0=Dom
  const daysInMonth = new Date(YEAR, currentMonth+1, 0).getDate();
  const todayStr = isoDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());

  for (let i=0; i<firstDay; i++){
    const empty = document.createElement('div');
    empty.className = 'day empty';
    grid.appendChild(empty);
  }

  for (let d=1; d<=daysInMonth; d++){
    const dateStr = isoDate(YEAR, currentMonth, d);
    const cell = document.createElement('div');
    const dow = new Date(YEAR, currentMonth, d).getDay();
    const mark = dayData[dateStr] || '';
    cell.className = 'day' + (mark ? ' '+mark : '') + ((dow===0||dow===6) && !mark ? ' weekend' : '') + (dateStr===todayStr ? ' today' : '');
    cell.innerHTML = `<div class="num">${d}</div><div class="mark">${mark}</div>`;
    cell.onclick = () => cycleDay(dateStr, cell);
    grid.appendChild(cell);
  }
}

function changeMonth(delta){
  currentMonth = Math.min(11, Math.max(0, currentMonth + delta));
  renderMonth();
}

/* ---------- Tap to cycle: '' -> T -> C -> '' ---------- */
async function cycleDay(dateStr, cell){
  const current = dayData[dateStr] || '';
  const next = current === '' ? 'T' : current === 'T' ? 'C' : '';

  dayData[dateStr] = next;
  const dow = new Date(dateStr).getUTCDay();
  const todayStr = isoDate(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
  const extra = [
    next ? next : '',
    (!next && (dow===0||dow===6)) ? 'weekend' : '',
    dateStr===todayStr ? 'today' : ''
  ].filter(Boolean).join(' ');
  cell.className = 'day ' + extra;
  const dayNum = parseInt(dateStr.slice(-2), 10);
  cell.innerHTML = `<div class="num">${dayNum}</div><div class="mark">${next}</div>`;
  updateTotals();

  const row = rowIndex[dateStr];
  if (!row){ setStatus('Data não encontrada na folha — usa "Inicializar folha".', true); return; }

  setStatus('A gravar…');
  try{
    await sheetsPut(`${SHEET_NAME}!B${row}`, [[next]]);
    setStatus('');
  }catch(err){
    setStatus('Não gravou: ' + err.message, true);
  }
}

/* ---------- Totals + pro-rata ---------- */
function updateTotals(){
  let countT = 0, countC = 0;
  Object.values(dayData).forEach(v => { if (v==='T') countT++; else if (v==='C') countC++; });

  const now = new Date();
  const startYear = new Date(YEAR,0,1);
  const endYear = new Date(YEAR,11,31);
  const ref = now < startYear ? startYear : (now > endYear ? endYear : now);
  const elapsedDays = Math.floor((ref - startYear)/86400000) + 1;
  const quotaProRata = Math.round((QUOTA_ANUAL * elapsedDays / 365) * 10) / 10;
  const saldo = Math.round((quotaProRata - countC) * 10) / 10;

  document.getElementById('statT').textContent = countT;
  document.getElementById('statC').textContent = countC;
  document.getElementById('statQuota').textContent = quotaProRata;
  document.getElementById('statSaldo').textContent = saldo;
  const box = document.getElementById('statSaldoBox');
  box.className = 'stat ' + (saldo < 0 ? 'saldo-bad' : 'saldo-ok');
}
</script>

<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
