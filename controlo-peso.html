<html lang="pt">
<head>

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231f8fbf'/%3E%3Ctext x='32' y='42' font-size='30' text-anchor='middle' fill='white' font-family='Arial'%3E⚖%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkNvbnRyb2xvIGRlIFBlc28iLAogICJzaG9ydF9uYW1lIjogIlBlc28iLAogICJzdGFydF91cmwiOiAiY29udHJvbG8tcGVzby5odG1sIiwKICAic2NvcGUiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiI2Y2ZjRlZiIsCiAgInRoZW1lX2NvbG9yIjogIiMxZjhmYmYiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJwZXNvaWNvbjE5Mi5wbmciLAogICAgICAic2l6ZXMiOiAiMTkyeDE5MiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0sCiAgICB7CiAgICAgICJzcmMiOiAicGVzb2ljb241MTIucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

<style>
  :root{
    --ink:#1c2430;
    --paper:#f6f4ef;
    --line:#dcd7cc;
    --brand:#1f8fbf;
    --brand-light:#3ab8e6;
    --brand-tint:#e2f4fb;
    --ok:#2f8a52;
    --ok-tint:#dcefdd;
    --bad:#c94b3f;
    --bad-tint:#fbdedb;
    --warn:#c98a1f;
    --warn-tint:#fdf6e6;
  }
  *{box-sizing:border-box;}
  html{background:var(--paper);}
  body{
    margin:0 auto;
    max-width:480px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
  }
  header{
    padding:calc(18px + env(safe-area-inset-top)) 18px 14px;
    border-bottom:2px solid var(--brand-light);
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:5;
  }
  h1{font-size:1.5rem;font-weight:800;color:var(--brand);margin:0;letter-spacing:-0.01em;}
  .sub{font-size:0.82rem;color:#6b6558;}
  #authArea{padding:40px 18px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
  button{font-family:inherit;border:none;border-radius:10px;padding:11px 18px;font-size:0.95rem;font-weight:600;cursor:pointer;min-height:44px;}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-secondary{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:var(--bad);color:#fff;}
  .btn-primary:disabled{opacity:0.5;cursor:default;}
  input,select{
    font-family:inherit;border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-size:0.95rem;background:#fff;color:var(--ink);width:100%;
  }
  label{font-size:0.78rem;color:#6b6558;font-weight:600;display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}

  #tabBar{display:flex;gap:6px;padding:14px 18px 0;}
  .tabBtn{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 4px;font-weight:600;font-size:0.76rem;color:#6b6558;min-height:44px;}
  .tabBtn.active{background:var(--brand);color:#fff;border-color:var(--brand);}
  .hidden{display:none !important;}
  .tabPanel{padding:14px 18px 24px;}

  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .card h3{margin:0 0 10px;font-size:0.95rem;color:var(--ink);}

  #statsGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px;}
  .stat{background:#fff;border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:10px;padding:12px 14px;}
  .stat .label{font-size:0.7rem;color:#6b6558;text-transform:uppercase;letter-spacing:.04em;}
  .stat .value{font-size:1.3rem;font-weight:700;margin-top:2px;}
  .stat .sub2{font-size:0.7rem;color:#a29c8c;margin-top:2px;}
  .stat.loss{border-left-color:var(--ok);}
  .stat.loss .value{color:var(--ok);}
  .stat.gain{border-left-color:var(--bad);}
  .stat.gain .value{color:var(--bad);}

  #progressWrap{margin:6px 0 4px;}
  #progressBarBg{background:#eee7d8;border-radius:999px;height:16px;overflow:hidden;border:1px solid var(--line);}
  #progressBarFill{background:linear-gradient(90deg,var(--brand),var(--ok));height:100%;width:0%;transition:width .3s ease;}
  #progressLabels{display:flex;justify-content:space-between;font-size:0.72rem;color:#6b6558;margin-top:4px;}

  .imcBadge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:0.78rem;font-weight:700;}

  #periodBar{display:flex;gap:6px;margin-bottom:12px;}
  .periodBtn{flex:1;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 4px;font-size:0.76rem;font-weight:600;color:#6b6558;min-height:36px;}
  .periodBtn.active{background:var(--brand);color:#fff;border-color:var(--brand);}
  #chartWrap{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;}

  .regRow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .regRow:last-child{border-bottom:none;}
  .regDate{flex:1;}
  .regDate .d1{font-weight:600;font-size:0.9rem;}
  .regDate .d2{font-size:0.72rem;color:#a29c8c;}
  .regPeso{font-weight:700;font-size:1rem;min-width:64px;text-align:right;}
  .regDelta{font-size:0.75rem;font-weight:700;min-width:52px;text-align:right;}
  .regDelta.up{color:var(--bad);}
  .regDelta.down{color:var(--ok);}
  .regDelta.same{color:#a29c8c;}
  .regActions{display:flex;gap:6px;}
  .iconBtn{background:none;border:none;padding:6px;min-height:auto;cursor:pointer;color:#6b6558;}
  .iconBtn:hover{color:var(--brand);}

  #modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;z-index:20;}
  #modalOverlay.hidden{display:none;}
  #modalBox{background:#fff;border-radius:16px 16px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px;margin:0 auto;}
  #modalBox h3{margin-top:0;}
  #modalBtns{display:flex;gap:10px;margin-top:14px;}
  #modalBtns button{flex:1;}

  footer{
    position:fixed;bottom:0;left:0;right:0;
    max-width:480px;margin:0 auto;
    background:var(--paper);border-top:1px solid var(--line);
    padding:8px 18px calc(8px + env(safe-area-inset-bottom));
    text-align:center;font-size:0.72rem;color:#a29c8c;
  }
  #status{font-size:0.8rem;padding:0 18px;color:var(--bad);min-height:1.2em;}
</style>
</head>
<body>

<header>
  <h1>Controlo de Peso</h1>
  <div class="sub" id="headerSub">Regista, acompanha, atinge o objetivo.</div>
</header>

<div id="authArea">
  <p>Inicia sessão para aceder aos teus registos.</p>
  <button id="signinBtn" class="btn-primary">Iniciar sessão com Google</button>
</div>

<div id="app" class="hidden">
  <div id="status"></div>

  <div id="tabBar">
    <button class="tabBtn active" id="tabBtnResumo">Resumo</button>
    <button class="tabBtn" id="tabBtnGrafico">Gráfico</button>
    <button class="tabBtn" id="tabBtnRegistos">Registos</button>
    <button class="tabBtn" id="tabBtnConfig">Config</button>
  </div>

  <!-- ===== TAB RESUMO ===== -->
  <div id="tabResumo" class="tabPanel">

    <div class="card">
      <h3>Novo registo</h3>
      <div class="field">
        <label>Peso (kg)</label>
        <input type="number" step="0.1" id="novoPeso" placeholder="ex: 109.8">
      </div>
      <div class="field">
        <label>Nota (opcional)</label>
        <input type="text" id="novaNota" placeholder="ex: jejum, pós-treino...">
      </div>
      <button class="btn-primary" id="btnRegistar" style="width:100%;">Registar peso de hoje</button>
    </div>

    <div id="statsGrid"></div>

    <div class="card" id="progressCard">
      <h3>Progresso até ao objetivo</h3>
      <div id="progressWrap">
        <div id="progressBarBg"><div id="progressBarFill"></div></div>
        <div id="progressLabels">
          <span id="progLeft"></span>
          <span id="progPct"></span>
          <span id="progRight"></span>
        </div>
      </div>
    </div>

    <div class="card" id="imcCard">
      <h3>IMC</h3>
      <div id="imcValue" style="font-size:1.6rem;font-weight:800;"></div>
      <div id="imcClasse"></div>
    </div>

    <div class="card" id="kcalCard">
      <h3>Estimativa de gasto calórico diário</h3>
      <div id="kcalValue" style="font-size:1.6rem;font-weight:800;"></div>
      <div class="sub2" style="font-size:0.78rem;color:#6b6558;">TMB (Mifflin-St Jeor) × nível de atividade</div>
    </div>

  </div>

  <!-- ===== TAB GRÁFICO ===== -->
  <div id="tabGrafico" class="tabPanel hidden">
    <div id="periodBar">
      <button class="periodBtn active" data-period="all">Sempre</button>
      <button class="periodBtn" data-period="year">Último ano</button>
      <button class="periodBtn" data-period="month">Último mês</button>
      <button class="periodBtn" data-period="week">Última semana</button>
    </div>
    <div id="chartWrap">
      <canvas id="weightChart" height="260"></canvas>
    </div>
  </div>

  <!-- ===== TAB REGISTOS ===== -->
  <div id="tabRegistos" class="tabPanel hidden">
    <div class="card" id="registosList" style="padding:6px 16px;"></div>
  </div>

  <!-- ===== TAB CONFIG ===== -->
  <div id="tabConfig" class="tabPanel hidden">
    <div class="card">
      <h3>Dados pessoais</h3>
      <div class="field">
        <label>Altura (cm)</label>
        <input type="number" id="cfgAltura" placeholder="ex: 178">
      </div>
      <div class="field">
        <label>Data de nascimento</label>
        <input type="date" id="cfgNascimento">
      </div>
      <div class="field">
        <label>Sexo</label>
        <select id="cfgSexo">
          <option value="">—</option>
          <option value="M">Masculino</option>
          <option value="F">Feminino</option>
        </select>
      </div>
      <div class="field">
        <label>Peso alvo (kg)</label>
        <input type="number" step="0.1" id="cfgPesoAlvo" placeholder="ex: 90">
      </div>
      <div class="field">
        <label>Nível de atividade</label>
        <select id="cfgAtividade">
          <option value="1.2">Sedentário</option>
          <option value="1.375">Leve (1-3x/semana)</option>
          <option value="1.55">Moderado (3-5x/semana)</option>
          <option value="1.725">Intenso (6-7x/semana)</option>
        </select>
      </div>
      <button class="btn-primary" id="btnGuardarConfig" style="width:100%;">Guardar configuração</button>
    </div>
  </div>

</div>

<div id="modalOverlay" class="hidden">
  <div id="modalBox">
    <h3>Editar registo</h3>
    <div class="field">
      <label>Peso (kg)</label>
      <input type="number" step="0.1" id="editPeso">
    </div>
    <div class="field">
      <label>Nota</label>
      <input type="text" id="editNota">
    </div>
    <div id="modalBtns">
      <button class="btn-danger" id="btnEliminar">Eliminar</button>
      <button class="btn-secondary" id="btnCancelarEdit">Cancelar</button>
      <button class="btn-primary" id="btnGuardarEdit">Guardar</button>
    </div>
  </div>
</div>

<footer>Bruno Pereira · Beta 1</footer>

<script>
/* ============================================================
   CONFIGURAÇÃO
   ============================================================ */
const CLIENT_ID = '108256538530-fgunbb52s7f3s9aurfpjtaf01v8fjbph.apps.googleusercontent.com';
const SPREADSHEET_ID = '1UzEXtl7w6jMsk-c7Pkt3kq97AXL6XIiwTrjOYUaYFLs';
const SHEET_REGISTOS = 'Registos';
const SHEET_CONFIG = 'Config';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
/* ============================================================ */

let tokenClient;
let accessToken = null;
let registos = [];   // [{row, date: Date, peso: Number, nota: String}]
let config = { altura: null, nascimento: null, sexo: '', pesoAlvo: null, atividade: 1.2 };
let currentTab = 'resumo';
let currentPeriod = 'all';
let weightChart = null;
let editingRow = null;

function setStatus(msg, isErr=false){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isErr ? 'var(--bad)' : '#6b6558';
}

/* ---------- Auth ---------- */
window.onload = () => {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error){ setStatus('Falha no login: ' + resp.error, true); return; }
      accessToken = resp.access_token;
      onSignedIn();
    }
  });
  document.getElementById('signinBtn').onclick = () => tokenClient.requestAccessToken();

  document.getElementById('tabBtnResumo').onclick = () => showTab('resumo');
  document.getElementById('tabBtnGrafico').onclick = () => showTab('grafico');
  document.getElementById('tabBtnRegistos').onclick = () => showTab('registos');
  document.getElementById('tabBtnConfig').onclick = () => showTab('config');

  document.getElementById('btnRegistar').onclick = onRegistarNovo;
  document.getElementById('btnGuardarConfig').onclick = onGuardarConfig;

  document.querySelectorAll('.periodBtn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.periodBtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      renderChart();
    };
  });

  document.getElementById('btnCancelarEdit').onclick = closeModal;
  document.getElementById('btnGuardarEdit').onclick = onGuardarEdit;
  document.getElementById('btnEliminar').onclick = onEliminarRegisto;
  document.getElementById('modalOverlay').onclick = (e) => { if (e.target.id === 'modalOverlay') closeModal(); };
};

function showTab(tab){
  currentTab = tab;
  ['resumo','grafico','registos','config'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('hidden', t !== tab);
    document.getElementById('tabBtn' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
  });
  if (tab === 'grafico') renderChart();
}

async function onSignedIn(){
  document.getElementById('authArea').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  setStatus('A carregar dados...');
  await loadConfig();
  await loadRegistos();
  setStatus('');
  renderAll();
}

/* ---------- Sheets API helpers ---------- */
async function sheetsGet(range){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE`;
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (!res.ok) throw new Error('Erro a ler a folha (' + res.status + ')');
  return res.json();
}

async function sheetsPut(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, values })
  });
  if (!res.ok) throw new Error('Erro a gravar (' + res.status + ')');
  return res.json();
}

async function sheetsAppend(range, values){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ range, values })
  });
  if (!res.ok) throw new Error('Erro a adicionar (' + res.status + ')');
  return res.json();
}

/* ---------- Date helpers (serial <-> Date) ---------- */
function serialToDate(v){
  if (typeof v === 'number') {
    // Google Sheets epoch: 1899-12-30
    return new Date(Date.UTC(1899, 11, 30) + Math.round(v * 86400000));
  }
  if (typeof v === 'string' && v.trim() !== '') {
    const d = new Date(v.replace(' ', 'T'));
    if (!isNaN(d.getTime())) return d;
  }
  return null;
}

/* ---------- Load Config ---------- */
async function loadConfig(){
  try{
    const data = await sheetsGet(`${SHEET_CONFIG}!B2:B6`);
    const v = data.values || [];
    config.altura = v[0] && v[0][0] !== '' ? Number(v[0][0]) : null;
    const nasc = v[1] ? v[1][0] : '';
    if (typeof nasc === 'number') {
      config.nascimento = serialToDate(nasc);
    } else if (typeof nasc === 'string' && nasc.trim() !== '') {
      const d = new Date(nasc);
      config.nascimento = isNaN(d.getTime()) ? null : d;
    } else {
      config.nascimento = null;
    }
    config.sexo = v[2] ? String(v[2][0]) : '';
    config.pesoAlvo = v[3] && v[3][0] !== '' ? Number(v[3][0]) : null;
    config.atividade = v[4] && v[4][0] !== '' ? Number(v[4][0]) : 1.2;
  } catch(e){
    setStatus('Não foi possível ler a Config: ' + e.message, true);
  }
  // Preencher formulário
  document.getElementById('cfgAltura').value = config.altura ?? '';
  document.getElementById('cfgNascimento').value = config.nascimento ? isoDateOnly(config.nascimento) : '';
  document.getElementById('cfgSexo').value = config.sexo || '';
  document.getElementById('cfgPesoAlvo').value = config.pesoAlvo ?? '';
  document.getElementById('cfgAtividade').value = config.atividade;
}

function isoDateOnly(d){
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n){ return n.toString().padStart(2,'0'); }

async function onGuardarConfig(){
  const altura = document.getElementById('cfgAltura').value;
  const nascimento = document.getElementById('cfgNascimento').value;
  const sexo = document.getElementById('cfgSexo').value;
  const pesoAlvo = document.getElementById('cfgPesoAlvo').value;
  const atividade = document.getElementById('cfgAtividade').value;
  try{
    await sheetsPut(`${SHEET_CONFIG}!B2:B6`, [[altura],[nascimento],[sexo],[pesoAlvo],[atividade]]);
    setStatus('Configuração guardada.');
    await loadConfig();
    renderAll();
  } catch(e){
    setStatus('Erro ao guardar configuração: ' + e.message, true);
  }
}

/* ---------- Load Registos ---------- */
async function loadRegistos(){
  registos = [];
  try{
    const data = await sheetsGet(`${SHEET_REGISTOS}!A2:C100000`);
    const v = data.values || [];
    v.forEach((row, i) => {
      const dateVal = row[0];
      const pesoVal = row[1];
      if (dateVal === undefined || dateVal === '' || pesoVal === undefined || pesoVal === '') return;
      const d = serialToDate(dateVal);
      const p = Number(pesoVal);
      if (!d || isNaN(p)) return;
      registos.push({ row: i + 2, date: d, peso: p, nota: row[2] || '' });
    });
    registos.sort((a,b) => a.date - b.date);
  } catch(e){
    setStatus('Não foi possível ler os Registos: ' + e.message, true);
  }
}

/* ---------- Registar novo peso ---------- */
async function onRegistarNovo(){
  const pesoStr = document.getElementById('novoPeso').value;
  const nota = document.getElementById('novaNota').value;
  const peso = Number(pesoStr);
  if (!pesoStr || isNaN(peso) || peso <= 0){
    setStatus('Introduz um peso válido.', true);
    return;
  }
  const now = new Date();
  const dataStr = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':00';
  try{
    setStatus('A gravar...');
    await sheetsAppend(`${SHEET_REGISTOS}!A:C`, [[dataStr, peso, nota]]);
    document.getElementById('novoPeso').value = '';
    document.getElementById('novaNota').value = '';
    await loadRegistos();
    setStatus('Registo adicionado.');
    renderAll();
  } catch(e){
    setStatus('Erro ao registar: ' + e.message, true);
  }
}

/* ---------- Editar / eliminar registo ---------- */
function openModal(reg){
  editingRow = reg.row;
  document.getElementById('editPeso').value = reg.peso;
  document.getElementById('editNota').value = reg.nota;
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){
  editingRow = null;
  document.getElementById('modalOverlay').classList.add('hidden');
}
async function onGuardarEdit(){
  const peso = Number(document.getElementById('editPeso').value);
  const nota = document.getElementById('editNota').value;
  if (isNaN(peso) || peso <= 0){ setStatus('Peso inválido.', true); return; }
  try{
    await sheetsPut(`${SHEET_REGISTOS}!B${editingRow}:C${editingRow}`, [[peso, nota]]);
    closeModal();
    await loadRegistos();
    setStatus('Registo atualizado.');
    renderAll();
  } catch(e){
    setStatus('Erro ao atualizar: ' + e.message, true);
  }
}
async function onEliminarRegisto(){
  if (!confirm('Eliminar este registo?')) return;
  try{
    await sheetsPut(`${SHEET_REGISTOS}!A${editingRow}:C${editingRow}`, [['','','']]);
    closeModal();
    await loadRegistos();
    setStatus('Registo eliminado.');
    renderAll();
  } catch(e){
    setStatus('Erro ao eliminar: ' + e.message, true);
  }
}

/* ---------- Cálculos ---------- */
function idadeAnos(nascimento){
  if (!nascimento) return null;
  const hoje = new Date();
  let idade = hoje.getFullYear() - nascimento.getFullYear();
  const m = hoje.getMonth() - nascimento.getMonth();
  if (m < 0 || (m === 0 && hoje.getDate() < nascimento.getDate())) idade--;
  return idade;
}

function calcIMC(peso, alturaCm){
  if (!peso || !alturaCm) return null;
  const alturaM = alturaCm / 100;
  return peso / (alturaM * alturaM);
}

function classificaIMC(imc){
  if (imc === null) return { texto:'—', cor:'#6b6558', bg:'#eee' };
  if (imc < 18.5) return { texto:'Abaixo do peso', cor:'#a8690f', bg:'var(--warn-tint)' };
  if (imc < 25)   return { texto:'Peso normal', cor:'var(--ok)', bg:'var(--ok-tint)' };
  if (imc < 30)   return { texto:'Excesso de peso', cor:'#a8690f', bg:'var(--warn-tint)' };
  if (imc < 35)   return { texto:'Obesidade grau I', cor:'var(--bad)', bg:'var(--bad-tint)' };
  if (imc < 40)   return { texto:'Obesidade grau II', cor:'var(--bad)', bg:'var(--bad-tint)' };
  return { texto:'Obesidade grau III', cor:'var(--bad)', bg:'var(--bad-tint)' };
}

function calcTMB(peso, alturaCm, idade, sexo){
  if (!peso || !alturaCm || idade === null || !sexo) return null;
  const base = 10*peso + 6.25*alturaCm - 5*idade;
  return sexo === 'M' ? base + 5 : base - 161;
}

// média de perda (kg/dia) entre a primeira e a última medição de um período
function mediaPerdaPeriodo(dias){
  if (registos.length < 2) return null;
  const agora = registos[registos.length - 1].date;
  const limite = new Date(agora.getTime() - dias*86400000);
  const noPeriodo = registos.filter(r => r.date >= limite);
  if (noPeriodo.length < 2) return null;
  const primeiro = noPeriodo[0];
  const ultimo = noPeriodo[noPeriodo.length - 1];
  const diasDecorridos = (ultimo.date - primeiro.date) / 86400000;
  if (diasDecorridos <= 0) return null;
  return (primeiro.peso - ultimo.peso) / diasDecorridos; // positivo = a perder
}

/* ---------- Render ---------- */
function renderAll(){
  renderStats();
  renderProgress();
  renderIMC();
  renderKcal();
  renderRegistos();
  if (currentTab === 'grafico') renderChart();
}

function renderStats(){
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  if (registos.length === 0){
    grid.innerHTML = '<div class="card" style="grid-column:1/-1;">Sem registos ainda. Adiciona o primeiro peso acima.</div>';
    return;
  }
  const desdeInicio = mediaPerdaPeriodo(999999);
  const ult30 = mediaPerdaPeriodo(30);
  const ult7 = mediaPerdaPeriodo(7);
  const mediaSemanal = ult7 !== null ? ult7 * 7 : null;

  const stats = [
    { label:'Peso atual', value: registos[registos.length-1].peso.toFixed(1) + ' kg', sub: fmtData(registos[registos.length-1].date) },
    { label:'Total perdido', value: (registos[0].peso - registos[registos.length-1].peso).toFixed(1) + ' kg', sub: 'desde ' + fmtDataCurta(registos[0].date), cls: (registos[0].peso - registos[registos.length-1].peso) >= 0 ? 'loss' : 'gain' },
    { label:'Média/dia desde início', value: fmtMedia(desdeInicio), sub:'kg por dia' },
    { label:'Média/dia últimos 30d', value: fmtMedia(ult30), sub:'kg por dia' },
    { label:'Média/dia últimos 7d', value: fmtMedia(ult7), sub:'kg por dia' },
    { label:'Média semanal (7d)', value: fmtMedia(mediaSemanal), sub:'kg por semana' },
  ];
  stats.forEach(s => {
    const div = document.createElement('div');
    div.className = 'stat' + (s.cls ? ' ' + s.cls : '');
    div.innerHTML = `<div class="label">${s.label}</div><div class="value">${s.value}</div><div class="sub2">${s.sub||''}</div>`;
    grid.appendChild(div);
  });
}

function fmtMedia(v){
  if (v === null) return '—';
  const sinal = v >= 0 ? '−' : '+';
  return sinal + Math.abs(v).toFixed(3);
}

function fmtData(d){
  return d.toLocaleDateString('pt-PT') + ' ' + pad(d.getHours())+':'+pad(d.getMinutes());
}
function fmtDataCurta(d){
  return d.toLocaleDateString('pt-PT');
}

function renderProgress(){
  const card = document.getElementById('progressCard');
  if (registos.length === 0 || !config.pesoAlvo){
    card.querySelector('#progressWrap').innerHTML = '<div class="sub2" style="font-size:0.85rem;color:#6b6558;">Define o peso alvo em Configurações.</div>';
    return;
  }
  const pesoInicial = registos[0].peso;
  const pesoAtual = registos[registos.length-1].peso;
  const pesoAlvo = config.pesoAlvo;
  let pct = 0;
  if (pesoInicial !== pesoAlvo){
    pct = ((pesoInicial - pesoAtual) / (pesoInicial - pesoAlvo)) * 100;
  }
  pct = Math.max(0, Math.min(100, pct));
  document.getElementById('progressWrap').innerHTML = `
    <div id="progressBarBg"><div id="progressBarFill" style="width:${pct}%;"></div></div>
    <div id="progressLabels">
      <span>${pesoInicial.toFixed(1)} kg</span>
      <span>${pct.toFixed(0)}%</span>
      <span>${pesoAlvo.toFixed(1)} kg</span>
    </div>`;
}

function renderIMC(){
  if (registos.length === 0 || !config.altura){
    document.getElementById('imcValue').textContent = '—';
    document.getElementById('imcClasse').innerHTML = '<span class="sub2" style="font-size:0.8rem;color:#6b6558;">Define a altura em Configurações.</span>';
    return;
  }
  const pesoAtual = registos[registos.length-1].peso;
  const imc = calcIMC(pesoAtual, config.altura);
  const cls = classificaIMC(imc);
  document.getElementById('imcValue').textContent = imc.toFixed(1);
  document.getElementById('imcClasse').innerHTML = `<span class="imcBadge" style="color:${cls.cor};background:${cls.bg};">${cls.texto}</span>`;
}

function renderKcal(){
  if (registos.length === 0 || !config.altura || !config.nascimento || !config.sexo){
    document.getElementById('kcalValue').textContent = '—';
    return;
  }
  const pesoAtual = registos[registos.length-1].peso;
  const idade = idadeAnos(config.nascimento);
  const tmb = calcTMB(pesoAtual, config.altura, idade, config.sexo);
  if (tmb === null){
    document.getElementById('kcalValue').textContent = '—';
    return;
  }
  const tdee = tmb * (config.atividade || 1.2);
  document.getElementById('kcalValue').textContent = Math.round(tdee) + ' kcal';
}

function renderRegistos(){
  const list = document.getElementById('registosList');
  list.innerHTML = '';
  if (registos.length === 0){
    list.innerHTML = '<div style="padding:10px 0;">Sem registos.</div>';
    return;
  }
  const desc = [...registos].sort((a,b) => b.date - a.date);
  desc.forEach((reg) => {
    const idxAsc = registos.indexOf(reg);
    const anterior = idxAsc > 0 ? registos[idxAsc - 1] : null;
    let deltaHtml = '<span class="regDelta same">—</span>';
    if (anterior){
      const diff = reg.peso - anterior.peso;
      if (diff > 0.001) deltaHtml = `<span class="regDelta up">▲ ${diff.toFixed(1)}</span>`;
      else if (diff < -0.001) deltaHtml = `<span class="regDelta down">▼ ${Math.abs(diff).toFixed(1)}</span>`;
      else deltaHtml = '<span class="regDelta same">=</span>';
    }
    const row = document.createElement('div');
    row.className = 'regRow';
    row.innerHTML = `
      <div class="regDate">
        <div class="d1">${fmtDataCurta(reg.date)}</div>
        <div class="d2">${pad(reg.date.getHours())}:${pad(reg.date.getMinutes())}${reg.nota ? ' · ' + escapeHtml(reg.nota) : ''}</div>
      </div>
      <div class="regPeso">${reg.peso.toFixed(1)} kg</div>
      ${deltaHtml}
      <div class="regActions">
        <button class="iconBtn" data-row="${reg.row}">✎</button>
      </div>`;
    row.querySelector('.iconBtn').onclick = () => openModal(reg);
    list.appendChild(row);
  });
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderChart(){
  const ctx = document.getElementById('weightChart');
  if (!ctx || registos.length === 0) return;
  let filtrado = registos;
  const agora = registos[registos.length-1].date;
  if (currentPeriod === 'year'){
    const limite = new Date(agora); limite.setFullYear(limite.getFullYear() - 1);
    filtrado = registos.filter(r => r.date >= limite);
  } else if (currentPeriod === 'month'){
    const limite = new Date(agora); limite.setMonth(limite.getMonth() - 1);
    filtrado = registos.filter(r => r.date >= limite);
  } else if (currentPeriod === 'week'){
    const limite = new Date(agora.getTime() - 7*86400000);
    filtrado = registos.filter(r => r.date >= limite);
  }
  const labels = filtrado.map(r => fmtDataCurta(r.date));
  const dados = filtrado.map(r => r.peso);

  if (weightChart) weightChart.destroy();
  weightChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Peso (kg)',
        data: dados,
        borderColor: '#1f8fbf',
        backgroundColor: 'rgba(31,143,191,0.1)',
        tension: 0.25,
        pointRadius: 2,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { maxTicksLimit: 6, font: { size: 10 } } },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });
}
</script>
